<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceango</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0efe9;--bg4:#e8e7e0;--surface:#ffffff;--surface2:#f0efe9;
  --border:#dddbd3;--border2:#c8c6bc;
  --txt:#1a2218;--txt2:#3d4a39;--txt3:#7a8a75;
  --accent:#2d6a3f;--accent2:#235530;--accent-dim:#2d6a3f14;
  --green-mid:#5a9e6f;--green-light:#a8c9b0;--green-pale:#d4e8da;
  --gold:#b8860b;--gold-dim:#b8860b14;
  --red:#c0392b;--red-dim:#c0392b12;
  --blue:#1a6b8a;--blue-dim:#1a6b8a12;
  --r:6px;--rl:10px;--rx:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}

/* PIN */
#pinLock{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
#pinLock.gone{display:none}
.pin-brand{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--txt);letter-spacing:-1px;margin-bottom:2px}
.pin-brand em{color:var(--accent);font-style:normal}
.pin-tagline{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--txt3);margin-bottom:48px;font-weight:500}
.pin-dots{display:flex;gap:12px;margin-bottom:28px}
.pin-dot{width:10px;height:10px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);transition:all .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-grid{display:grid;grid-template-columns:repeat(3,68px);gap:8px}
.pin-btn{height:68px;border-radius:var(--rl);background:var(--bg2);border:1px solid var(--border2);color:var(--txt);font-size:20px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:-0.5px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.pin-btn:hover{background:var(--green-pale);border-color:var(--accent);color:var(--accent)}
.pin-btn:active{transform:scale(.94)}
.pin-btn.del{font-size:11px;color:var(--txt3);letter-spacing:1px;font-family:'DM Sans',sans-serif}
.pin-err{color:var(--red);font-size:11px;margin-top:12px;height:14px;text-align:center;letter-spacing:.5px}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loadingScreen.fade{opacity:0;pointer-events:none}
.load-brand{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--txt);margin-bottom:4px;letter-spacing:-0.5px}
.load-brand em{color:var(--accent);font-style:normal}
.load-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);margin-bottom:28px}
.load-bar{width:140px;height:2px;background:var(--bg4);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--accent);animation:lf 1.2s ease forwards}
@keyframes lf{from{width:0}to{width:100%}}
.load-msg{font-size:11px;color:var(--txt3);margin-top:10px;letter-spacing:.3px}

/* APP */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sb{width:200px;background:var(--accent);display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.15)}
.sb-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;line-height:1}
.sb-logo-text em{color:#a8e6b8;font-style:normal}
.sb-logo-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-top:4px;font-weight:500}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.sb-section{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);padding:10px 10px 5px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.65);font-size:12.5px;font-weight:500;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;position:relative}
.ni:hover{background:rgba(255,255,255,.12);color:#ffffff}
.ni.on{background:rgba(255,255,255,.18);color:#ffffff}
.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:18px;background:#a8e6b8;border-radius:0 2px 2px 0}
.ni svg{width:14px;height:14px;flex-shrink:0}
.nbadge{background:#a8e6b8;color:var(--accent);border-radius:20px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:auto;font-family:'DM Mono',monospace}
.sb-divider{height:1px;background:rgba(255,255,255,.12);margin:6px 8px}
.sb-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.12);font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.sb-dot{width:5px;height:5px;border-radius:50%;background:#a8e6b8}

/* TOPBAR */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ptitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.date-chip{font-size:11px;color:var(--txt3);background:var(--bg3);padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-family:'DM Mono',monospace;letter-spacing:.3px}
.cfg-banner{padding:7px 20px;font-size:11px;display:flex;align-items:center;gap:7px;flex-shrink:0;font-weight:500;letter-spacing:.2px}
.cfg-banner.ok{background:#edf7f0;color:#2d6a3f;border-bottom:1px solid var(--border)}
.cfg-banner.warn{background:#fef9e7;color:var(--gold);border-bottom:1px solid var(--border)}
.notif-bar{background:linear-gradient(90deg,var(--green-pale),#e8f5ec);color:var(--txt);padding:7px 20px;font-size:11px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid var(--border);font-weight:500}
.notif-bar.hide{display:none}
.ntag{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);padding:2px 9px;border-radius:3px;font-size:10px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:22px 24px}

/* BTNS */
.btn{padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:5px;line-height:1;letter-spacing:.1px}
.bp{background:var(--accent);color:#fff}.bp:hover{background:var(--accent2)}
.bo{background:transparent;border:1px solid var(--border2);color:var(--txt2)}.bo:hover{background:var(--bg3);color:var(--txt);border-color:var(--border2)}
.bd{background:var(--red-dim);color:var(--red);border:1px solid #c0392b20}.bd:hover{background:#c0392b20}
.bam{background:var(--gold-dim);color:var(--gold);border:1px solid #b8860b22}.bam:hover{background:#b8860b22}
.bsm{padding:6px 11px;font-size:11.5px}.bxs{padding:4px 8px;font-size:11px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-sm{padding:13px 15px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* STAT CARDS */
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-bottom:8px}
.stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--txt);line-height:1;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--txt3);margin-top:5px}
.stat-accent{color:var(--accent)}
.stat-red{color:var(--red)}
.stat-gold{color:var(--gold)}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10.5px;font-weight:600;letter-spacing:.2px}
.tg{background:#edf7f0;color:var(--accent);border:1px solid #b8ddc2}
.ty{background:#fef9e7;color:var(--gold);border:1px solid #e8d28a}
.tb{background:#e8f4f8;color:var(--blue);border:1px solid #a8cdd8}
.tr{background:#fdf0ef;color:var(--red);border:1px solid #e8b8b4}
.tgr{background:var(--bg4);color:var(--txt3);border:1px solid var(--border)}

/* PROGRESS */
.pb{height:3px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;padding:9px 13px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);border-bottom:1px solid var(--border);background:var(--bg3)}
.tbl td{padding:10px 13px;border-bottom:1px solid var(--border);color:var(--txt);vertical-align:middle}
.tbl tr:hover td{background:var(--bg3)}
.tbl tr:last-child td{border-bottom:none}
.tw{overflow-x:auto}
.mono{font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500}

/* FORM */
.fg{margin-bottom:13px}
.fl{font-size:10px;font-weight:600;color:var(--txt3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--txt);background:var(--bg2);outline:none;transition:border-color .15s,box-shadow .15s;font-weight:400}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.fi option{background:var(--bg2)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(30,50,30,.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.modal{background:var(--bg2);border-radius:var(--rx);padding:26px;width:560px;max-width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal-lg{width:700px}
.modal-xl{width:920px}
.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.mt{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.mf{display:flex;gap:7px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.div{height:1px;background:var(--border);margin:16px 0}
.stitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--txt3);margin-bottom:12px}

/* SECTION HEAD */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.2px}

/* TASK ITEMS */
.ti{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;background:var(--bg2);transition:all .15s}
.ti:hover{border-color:var(--accent);background:var(--green-pale)}
.ti.done{opacity:.45}
.chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:2px}
.chk.on{background:var(--accent);border-color:var(--accent)}

/* CALENDAR */
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--bg3);border-bottom:1px solid var(--border)}
.cal-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:-.2px}
.cal-nav{background:var(--bg2);border:1px solid var(--border2);color:var(--txt2);cursor:pointer;padding:4px 12px;border-radius:var(--r);font-size:14px;font-family:'Syne',sans-serif;font-weight:700;transition:all .15s}
.cal-nav:hover{border-color:var(--accent);color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{text-align:center;font-size:9px;font-weight:700;color:var(--txt3);padding:7px 3px;background:var(--bg3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px}
.cal-day{min-height:70px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px;cursor:default;transition:background .1s}
.cal-day:hover{background:var(--bg3)}
.cal-day.today{background:#edf7f0}
.cal-day.other-month{opacity:.2}
.cal-day:nth-child(7n){border-right:none}
.cal-dn{font-size:10px;font-weight:600;color:var(--txt3);margin-bottom:2px;font-family:'DM Mono',monospace}
.cal-ev{background:var(--accent);color:#fff;border-radius:2px;padding:1px 5px;font-size:9px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;line-height:1.7;font-weight:600}
.cal-ev:hover{background:var(--accent2)}
.cal-ev.urgent{background:var(--red)}
.cal-ev.done-ev{background:var(--bg4);color:var(--txt3)}

/* TOAST */
.twrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{padding:10px 16px;border-radius:var(--r);font-size:12.5px;font-weight:600;animation:sin .2s ease;max-width:300px;border:1px solid transparent;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.ts{background:var(--bg2);color:var(--txt);border-color:var(--border2)}
.te{background:#fdf0ef;color:var(--red);border-color:#e8b8b4}
.ti2{background:#e8f4f8;color:var(--blue);border-color:#a8cdd8}
@keyframes sin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.ei{font-size:28px;margin-bottom:8px;opacity:.4}

/* PROJECT CARDS */
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;transition:border-color .15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.proj-card:hover{border-color:var(--green-mid)}
.proj-accent-bar{height:3px;background:var(--accent)}
.proj-accent-bar.paused{background:var(--gold)}
.proj-accent-bar.finished{background:var(--green-light)}
.proj-accent-bar.inactive{background:var(--bg4)}
.proj-inner{padding:16px 18px}
.proj-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:12px}
.proj-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.2px;margin-bottom:3px}
.proj-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.proj-client{font-size:11px;color:var(--txt3);font-weight:500}
.proj-code{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt3)}
.proj-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--txt);white-space:nowrap;text-align:right}
.proj-sub{font-size:10.5px;color:var(--txt3);text-align:right;margin-top:2px}
.proj-body{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end}
.proj-progress-wrap{flex:1}
.proj-progress-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;color:var(--txt3)}
.proj-pct{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent)}
.proj-footer{padding:10px 18px;border-top:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pay-chip{display:flex;align-items:center;gap:4px;border-radius:3px;padding:4px 8px;font-size:10.5px;font-weight:600;transition:all .15s;cursor:pointer;border:1px solid var(--border);background:var(--bg2)}
.pay-chip:hover{border-color:var(--accent);color:var(--accent)}
.pay-chip.paid{border-color:#b8ddc2;background:#edf7f0;color:var(--accent)}
.pay-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* CLIENT CARDS */
.client-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:15px 18px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px}
.client-card:hover{border-color:var(--green-mid);background:var(--bg3)}
.client-avatar{width:40px;height:40px;border-radius:8px;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;color:var(--accent);flex-shrink:0;font-weight:700;border:1px solid #b8ddc2}

/* PAGER */
.pager{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pg{padding:4px 9px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--txt3);font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;font-weight:500}
.pg:hover{border-color:var(--accent);color:var(--accent)}
.pg.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg:disabled{opacity:.3;cursor:default}

/* PROJ ROW (dashboard) */
.proj-row{padding:10px 13px;border-radius:var(--r);border:1px solid var(--border);margin-bottom:7px;background:var(--bg2);cursor:pointer;transition:all .15s}
.proj-row:hover{border-color:var(--accent);background:var(--green-pale)}

/* INVOICE */
.inv-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:13px}
.inv-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px;font-weight:500}
.inv-row:last-child{border-bottom:none}
.inv-row.total{font-weight:700;color:var(--txt);font-size:13px;border-top:1px solid var(--border2);margin-top:4px;padding-top:9px}
.inv-row.deduct{color:var(--red)}
.inv-row.add{color:var(--accent)}
.pct-input{width:60px;padding:5px 7px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:'DM Mono',monospace;text-align:center;background:var(--bg2);color:var(--txt)}
.pct-input:focus{outline:none;border-color:var(--accent)}
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer;padding:7px 10px;border-radius:var(--r);transition:background .1s}
.chk-row:hover{background:var(--bg3)}
.chk-row input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.chk-row label{font-size:12.5px;color:var(--txt2);cursor:pointer;flex:1}

/* TASK DETAIL */
.td-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px}
.td-label{font-weight:600;color:var(--txt3);min-width:76px;font-size:10px;text-transform:uppercase;letter-spacing:.7px;margin-top:2px}

/* QUOTE EDITOR */
.quote-editor{border:1px solid var(--border2);border-radius:var(--r);min-height:180px;padding:12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;line-height:1.6;color:var(--txt);background:var(--bg2)}
.quote-editor:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.editor-toolbar{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px;padding:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r)}
.tb-btn{padding:3px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--txt3);transition:all .1s;font-weight:600}
.tb-btn:hover{background:var(--green-pale);color:var(--accent);border-color:var(--accent)}

/* TPL ZONE */
.tpl-zone{border:1.5px dashed var(--border2);border-radius:var(--rl);padding:28px 20px;text-align:center;transition:all .2s;cursor:pointer;background:var(--bg3);position:relative}
.tpl-zone:hover{border-color:var(--accent);background:var(--green-pale)}
.tpl-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* CONTRACT BAR */
.contract-bar{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:var(--rl);padding:14px 18px;margin-bottom:14px}
.contract-bar .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt3);margin-bottom:3px;font-weight:700}
.contract-bar .big{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px}

/* FILTER BAR */
.filter-bar{display:flex;gap:6px;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.filter-label{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* TIPO ORDEN TABS */
.order-type-tabs{display:flex;gap:0;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ott{flex:1;padding:9px 10px;background:var(--bg3);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;color:var(--txt3);transition:all .15s;text-align:center;border-right:1px solid var(--border2)}
.ott:last-child{border-right:none}
.ott.on{background:var(--accent);color:#fff}
.ott.income.on{background:var(--accent)}
.ott.expense.on{background:var(--red)}
.ott.nofac.on{background:var(--gold)}

/* ANTICIPO BAR */
.anticipo-bar{background:linear-gradient(90deg,var(--green-pale),#fff);border:1px solid #b8ddc2;border-radius:var(--r);padding:8px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px}
.anticipo-bar .pct-fill{height:5px;background:var(--accent);border-radius:3px;transition:width .4s}

/* FOTO UPLOAD */
.foto-zone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;background:var(--bg3);position:relative;transition:all .2s}
.foto-zone:hover{border-color:var(--accent);background:var(--green-pale)}
.foto-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.foto-thumb{width:100%;max-height:120px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border)}

const TABLES_WITH_UPDATED=['projects','payment_schedule','tasks','orders','quotes','invoices'];

async function loadFromSupabase(){
  if(!sb)return false;
  try{
    $('loadMsg').textContent='Cargando datos…';
    const[c,p,ps,t,o,q]=await Promise.all([
      sb.from('clients').select('*'),sb.from('projects').select('*'),sb.from('payment_schedule').select('*'),
      sb.from('tasks').select('*').order('step_order'),sb.from('orders').select('*').order('order_date',{ascending:false}),
      sb.from('quotes').select('*').order('created_at',{ascending:false})
    ]);
    DB.clients=c.data||[];DB.projects=p.data||[];DB.payment_schedule=ps.data||[];
    DB.tasks=t.data||[];DB.orders=o.data||[];DB.quotes=q.data||[];
    // anticipos e invoices en local por ahora (o agregar tabla en Supabase)
    try{DB.invoices=JSON.parse(localStorage.getItem('oceango_invoices')||'[]');}catch{}
    try{DB.anticipos=JSON.parse(localStorage.getItem('oceango_anticipos')||'[]');}catch{}
    return true;
  }catch(e){console.error(e);return false;}
}
function saveInvoicesLocal(){try{localStorage.setItem('oceango_invoices',JSON.stringify(DB.invoices));}catch{}}
function saveAnticiposLocal(){try{localStorage.setItem('oceango_anticipos',JSON.stringify(DB.anticipos));}catch{}}

async function nextCode(prefix){const key=`oceango_seq_${prefix}`;const n=(parseInt(localStorage.getItem(key)||'0'))+1;localStorage.setItem(key,n);return`${prefix}-${String(n).padStart(4,'0')}-${new Date().getFullYear()}`;}

async function dbInsert(table,row){
  const r={...row,id:uid(),created_at:new Date().toISOString()};
  if(sb&&table!=='invoices'&&table!=='anticipos'){const{data,error}=await sb.from(table).insert(r).select().single();if(error){toast('Error: '+error.message,'te');return null;}DB[table]=[...(DB[table]||[]),data];return data;}
  DB[table]=[...(DB[table]||[]),r];
  if(table==='invoices')saveInvoicesLocal();
  if(table==='anticipos')saveAnticiposLocal();
  return r;
}
async function dbUpdate(table,id,changes){
  const upd=TABLES_WITH_UPDATED.includes(table)?{...changes,updated_at:new Date().toISOString()}:{...changes};
  if(sb&&table!=='invoices'&&table!=='anticipos'){const{error}=await sb.from(table).update(upd).eq('id',id);if(error){toast('Error: '+error.message,'te');return false;}}
  DB[table]=DB[table].map(r=>r.id===id?{...r,...upd}:r);
  if(table==='invoices')saveInvoicesLocal();
  if(table==='anticipos')saveAnticiposLocal();
  return true;
}
async function dbDelete(table,id){
  if(sb&&table!=='invoices'&&table!=='anticipos'){const{error}=await sb.from(table).delete().eq('id',id);if(error){toast('Error: '+error.message,'te');return false;}}
  DB[table]=DB[table].filter(r=>r.id!==id);
  if(table==='invoices')saveInvoicesLocal();
  if(table==='anticipos')saveAnticiposLocal();
  return true;
}

async function processPDFTemplate(file){
  toast('Procesando PDF…','ti2');
  try{
    if(!window.pdfjsLib){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}
    const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;const pages=[];
    for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const sc=2.0;const vp=page.getViewport({scale:sc});const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;pages.push(canvas.toDataURL('image/jpeg',0.9));}
    saveTemplate(pages);
  }catch(e){console.error(e);toast('Error al procesar PDF','te');}
}

// FISCAL
function calcInvoice(base,ivaPct,retRentaPct,retIvaPct){
  const subtotal=round2(base);const ivaAmt=round2(subtotal*ivaPct/100);const totalConIva=round2(subtotal+ivaAmt);
  const retRenta=round2(subtotal*retRentaPct/100);const retIva=round2(ivaAmt*retIvaPct/100);const neto=round2(totalConIva-retRenta-retIva);
  return{subtotal,ivaAmt,totalConIva,retRenta,retIva,neto};
}

// Calcular neto de una orden
function calcOrderNeto(amount,hasIva,ivaPct,hasRet,retPct,hasIvaRet,ivaRetPct){
  const base=Number(amount)||0;
  const ivaAmt=hasIva?round2(base*ivaPct/100):0;
  const retAmt=hasRet?round2(base*retPct/100):0;
  const ivaRetAmt=hasIvaRet?round2(ivaAmt*ivaRetPct/100):0;
  return round2(base+ivaAmt-retAmt-ivaRetAmt);
}

      ${ap.length===0?`<div class="empty"><div class="ei">📋</div>Sin proyectos activos</div>`:
        apS.map(p=>{
          const cl=DB.clients.find(c=>c.id===p.client_id);

      ${mkPager(S.dtPg,tot2,'dtPg')}

  </div>

// CALENDAR
function renderCalendar(){
  const yr=S.calYear,mo=S.calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const td=today();
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cells='';
  for(let i=0;i<firstDay;i++){const pd=new Date(yr,mo,0).getDate();cells+=`<div class="cal-day other-month"><div class="cal-dn">${pd-firstDay+i+1}</div></div>`;}
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===td;const evts=DB.tasks.filter(t=>t.due_date===ds);
    cells+=`<div class="cal-day${isT?' today':''}">
      <div class="cal-dn">${isT?`<span style="width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${d}</span>`:d}</div>
      ${evts.map(e=>`<div class="cal-ev${e.done?' done-ev':e.due_date<td?' urgent':''}" onclick="event.stopPropagation();showTaskDetail('${e.id}')" title="${e.title}">${e.due_time?e.due_time.slice(0,5)+' ':''}${e.title}</div>`).join('')}
    </div>`;
  }
  const rem=(7-(firstDay+dim)%7)%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-day other-month"><div class="cal-dn">${i}</div></div>`;
  return`<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div class="cal-title">${MONTHS[mo]} ${yr}</div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">${days.map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}</div>
  </div>`;
}
function calNav(dir){S.calMonth+=dir;if(S.calMonth>11){S.calMonth=0;S.calYear++;}if(S.calMonth<0){S.calMonth=11;S.calYear--;}render();}

      </div>

        ${[['Cobrado (neto)',fmtM(cob),'var(--accent)'],['Gastado',fmtM(gasto),'var(--red)'],['Por cobrar',fmtM(pendCob),'var(--gold)'],['Utilidad',fmtM(util),util>=0?'var(--txt)':'var(--red)']].map(([l,v,col])=>`<div style="background:var(--bg2);border-radius:var(--r);padding:8px 10px;border:1px solid var(--border)"><div style="font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px">${l}</div><div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:${col}">${v}</div></div>`).join('')}

    </div>
    <div style="font-size:11.5px;color:var(--txt3);margin-bottom:12px">${fmtD(p.start_date)} → ${fmtD(p.end_date)}</div>
    ${p.notes?`<div style="background:var(--green-pale);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--txt2);margin-bottom:13px;border-left:2px solid var(--accent)">${p.notes}</div>`:''}
    <div class="div"></div>
    <div class="stitle">Tareas · ${dn}/${pt.length} (${pc}%)</div>

        <div style="width:13px;height:13px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:${t.done?'var(--accent)':'var(--bg4)'}">${t.done?ic('check',8):''}</div>
        <span style="font-size:12px;flex:1;${t.done?'text-decoration:line-through;color:var(--txt3)':''}">${t.step_order||'·'}. ${t.title}</span>
        ${t.due_date?`<span style="font-size:10.5px;color:var(--txt3)">${fmtDS(t.due_date)}</span>`:''}
      </div>`).join('')}
    </div>
    <div class="div"></div>
    <div class="stitle">Cronograma de pagos</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${ps.length===0?`<span style="font-size:12px;color:var(--txt3)">Sin cuotas definidas</span>`:
        ps.map(x=>`<div onclick="togglePS('${x.id}',${!x.paid})" class="pay-chip ${x.paid?'paid':''}" style="font-size:12px;padding:6px 10px">
          <span class="pay-dot"></span>
          <span>${x.label}</span>
          <span style="color:var(--txt3)">${x.pct}% · ${fmtM(Number(p.contract_value)*x.pct/100)}</span>
          ${x.paid?`<span style="color:var(--accent)">✓</span>`:''}

  tasks.sort((a,b)=>(a.project_id+String(a.step_order||0).padStart(3,'0')).localeCompare(b.project_id+String(b.step_order||0).padStart(3,'0')));
  let lp=null;
  return`
  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Proyecto</span>
      <select class="fi" style="width:auto;padding:5px 9px;font-size:12px" onchange="setTF(this.value)">
        <option value="">Todos</option>
        ${DB.projects.map(p=>`<option value="${p.id}"${fp===p.id?' selected':''}>${p.name}</option>`).join('')}

            ${t.due_time?`<span style="font-size:11px;color:var(--txt3)">${ic('clk',10)} ${t.due_time.slice(0,5)}</span>`:''}
            ${t.location?`<span style="font-size:11px;color:var(--txt3)">${ic('pin',10)} ${t.location}</span>`:''}

// ===== FINANZAS =====
function renderFinance(){
  const ff=S.finFilter||'all';
  // Ingresos: usar neto_banco si existe, sino amount
  const incomeOrders=DB.orders.filter(o=>o.type==='income');
  const expenseOrders=DB.orders.filter(o=>o.type==='expense');

  const tiAll=incomeOrders.reduce((s,o)=>s+Number(o.neto_banco||o.amount),0);
  const teAll=expenseOrders.reduce((s,o)=>s+Number(o.amount),0);
  const tiP=incomeOrders.filter(o=>o.status==='paid').reduce((s,o)=>s+Number(o.neto_banco||o.amount),0);
  const teP=expenseOrders.filter(o=>o.status==='paid').reduce((s,o)=>s+Number(o.amount),0);
  const bal=tiP-teP;

  // Por cobrar = órdenes income pendientes, su neto
  const porCobrar=incomeOrders.filter(o=>o.status!=='paid').reduce((s,o)=>s+Number(o.neto_banco||o.amount),0);

  let ords=[...DB.orders];
  if(ff!=='all')ords=ords.filter(o=>o.type===ff);
  ords.sort((a,b)=>(b.order_date||'').localeCompare(a.order_date||''));

  return`
  <div class="g4" style="margin-bottom:20px">
    <div class="stat"><div class="stat-lbl">Ingresos neto banco</div><div class="stat-val stat-accent">${fmtM(tiAll)}</div><div class="stat-sub">${fmtM(tiP)} cobrado</div></div>
    <div class="stat"><div class="stat-lbl">Total gastos</div><div class="stat-val stat-red">${fmtM(teAll)}</div><div class="stat-sub">${fmtM(teP)} pagado</div></div>
    <div class="stat"><div class="stat-lbl">Balance</div><div class="stat-val" style="color:${bal>=0?'var(--txt)':'var(--red)'}">${fmtM(bal)}</div><div class="stat-sub">cobrado − pagado</div></div>
    <div class="stat"><div class="stat-lbl">Por cobrar (neto)</div><div class="stat-val stat-gold">${fmtM(porCobrar)}</div><div class="stat-sub">órdenes pendientes</div></div>
  </div>
  <div class="filter-bar">
    <div class="filter-group">
      ${[['all','Todos'],['income','Cobros'],['expense','Gastos']].map(([v,l])=>`<button class="btn bsm ${ff===v?'bp':'bo'}" onclick="setFF('${v}')">${l}</button>`).join('')}
      <div style="width:1px;background:var(--border);margin:0 4px;height:18px"></div>
      ${DB.clients.map(c=>`<button class="btn bo bxs" onclick="genPDF('${c.id}')" title="Informe ${c.name}">${ic('pdf',10)} ${c.name.split(' ')[0]}</button>`).join('')}
    </div>
    <button class="btn bp" onclick="openOrderModal()">+ Nueva Orden</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tw"><table class="tbl">
      <thead><tr><th>Código</th><th>Fecha</th><th>Proyecto</th><th>Concepto</th><th>Tipo</th><th>Monto bruto</th><th>Neto banco</th><th>Estado</th><th>Anticipos</th><th></th></tr></thead>
      <tbody>${ords.length===0?`<tr><td colspan="10"><div class="empty"><div class="ei">💳</div>Sin órdenes</div></td></tr>`:
        ords.map(o=>{
          const proj=DB.projects.find(p=>p.id===o.project_id);
          const ants=DB.anticipos.filter(a=>a.order_id===o.id);
          const antPag=ants.filter(a=>a.pagado).reduce((s,a)=>s+Number(a.monto),0);
          const antTot=ants.reduce((s,a)=>s+Number(a.monto),0);
          const neto=Number(o.neto_banco||o.amount);
          const pctAnt=neto>0?Math.min(100,Math.round(antPag/neto*100)):0;
          const isIncome=o.type==='income';
          const isFacSRI=o.billing_type==='factura_sri';
          const typeLabel=o.billing_type==='factura_sri'?'Fac. SRI':o.billing_type==='gasto'?'Gasto':o.billing_type==='sin_factura'?'Sin Fac.':'Cobro';
          const typeColor=o.billing_type==='gasto'?'tr':o.billing_type==='factura_sri'?'tb':'tgr';
          return`<tr>
            <td><span class="mono" style="color:var(--accent)">${o.code}</span></td>
            <td style="font-size:11.5px;color:var(--txt2)">${fmtD(o.order_date)}</td>
            <td style="font-size:11.5px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2)">${proj?.name||'—'}</td>
            <td style="font-size:11.5px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt2)">${o.concept}</td>
            <td>
              <span class="tag ${isIncome?'tg':'tr'}" style="display:block;margin-bottom:2px">${isIncome?'Cobro':'Gasto'}</span>
              <span class="tag ${typeColor}" style="font-size:9px">${typeLabel}</span>
            </td>
            <td><span style="font-weight:600;color:${isIncome?'var(--accent)':'var(--red)'}">${isIncome?'+':'-'}${fmtM(o.amount)}</span>
              ${isFacSRI&&o.invoice_num?`<div style="font-size:9.5px;color:var(--txt3);font-family:'DM Mono',monospace">${o.invoice_num}</div>`:''}
            </td>
            <td>
              ${isIncome?`<span style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--accent)">${fmtM(neto)}</span>
                ${neto!==Number(o.amount)?`<div style="font-size:9px;color:var(--txt3)">de ${fmtM(o.amount)}</div>`:''}
              `:`<span style="color:var(--txt3)">—</span>`}
            </td>
            <td><span class="tag ${o.status==='paid'?'tg':'ty'}" style="cursor:pointer" onclick="toggleOrder('${o.id}','${o.status}')">${o.status==='paid'?'Pagado':'Pendiente'}</span></td>
            <td>
              ${isIncome?`<div style="min-width:70px">
                <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);margin-bottom:2px"><span>${fmtM(antPag)}/${fmtM(neto)}</span><span>${pctAnt}%</span></div>
                <div style="height:4px;background:var(--bg4);border-radius:3px;overflow:hidden"><div style="height:100%;background:${pctAnt>=100?'var(--accent)':'var(--green-mid)'};width:${pctAnt}%;border-radius:3px"></div></div>
                <button class="btn bo bxs" style="margin-top:3px;font-size:10px" onclick="openAnticiposModal('${o.id}')">Anticipos</button>
              </div>`:'<span style="color:var(--txt3)">—</span>'}
            </td>
            <td><div style="display:flex;gap:3px">
              ${o.foto_url?`<button class="btn bo bxs" onclick="verFoto('${o.id}')" title="Ver comprobante">${ic('photo',10)}</button>`:''}
              <button class="btn bo bxs" onclick="openOrderModal('${o.id}')">${ic('edit',10)}</button>
              <button class="btn bd bxs" onclick="deleteOrder('${o.id}')">${ic('trash',10)}</button>
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>

// Crear orden de ingreso desde factura SRI
async function crearOrdenDesdeFac(invId){
  const inv=DB.invoices.find(x=>x.id===invId);if(!inv)return;
  const proj=inv.project_id?DB.projects.find(p=>p.id===inv.project_id):null;
  const code=await nextCode('ODC');
  const d={
    project_id:inv.project_id||null,
    type:'income',
    billing_type:'factura_sri',
    concept:inv.concept||`Factura ${inv.number}`,
    amount:inv.subtotal,
    neto_banco:inv.neto,
    order_date:inv.date||today(),
    status:'pending',
    invoice_num:inv.number,
    invoice_id:inv.id,
    has_iva:inv.iva_pct>0,
    iva_pct:inv.iva_pct,
    iva_amount:inv.iva_amt,
    has_retention:inv.ret_renta>0,
    retention_pct:inv.ret_renta_pct,
    retention_amount:inv.ret_renta,
    has_iva_retention:inv.ret_iva>0,
    iva_retention_pct:inv.ret_iva_pct,
    iva_retention_amount:inv.ret_iva,
    code
  };
  const res=await dbInsert('orders',d);
  if(res){toast('Ingreso creado y emparejado con factura');render();}
}

function liveCalc(){
  const base=parseFloat($('calc_base')?.value||0);const iva=parseFloat($('calc_iva')?.value||0);
  const ret=parseFloat($('calc_ret')?.value||0);const retiva=parseFloat($('calc_retiva')?.value||0);
  const res=$('calc_result');if(!res)return;
  if(!base||base<=0){res.style.display='none';return;}
  const c=calcInvoice(base,iva,ret,retiva);
  res.style.display='block';
  $('calc_lines').innerHTML=`
    <div class="inv-row"><span>Subtotal (base)</span><span style="font-weight:700">${fmtM(c.subtotal)}</span></div>
    <div class="inv-row add"><span>+ IVA ${iva}%</span><span>+${fmtM(c.ivaAmt)}</span></div>
    <div class="inv-row" style="font-weight:700;border-top:1px solid var(--border);padding-top:7px"><span>Total c/IVA</span><span style="color:var(--accent)">${fmtM(c.totalConIva)}</span></div>
    <div class="inv-row deduct" style="margin-top:8px"><span>− Ret. renta ${ret}%</span><span>−${fmtM(c.retRenta)}</span></div>
    <div class="inv-row deduct"><span>− Ret. IVA ${retiva}%</span><span>−${fmtM(c.retIva)}</span></div>
    <div class="inv-row total"><span>NETO A RECIBIR</span><span style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700">${fmtM(c.neto)}</span></div>`;
}

function modal(id,title,body,large=false){
  document.getElementById(id+'_wrap')?.remove();
  const wrap=document.createElement('div');wrap.id=id+'_wrap';wrap.className='ov';
  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.innerHTML=`<div class="modal${large?' modal-lg':''}">
    <div class="mh"><div class="mt">${title}</div><button class="btn bo bxs" onclick="document.getElementById('${id}_wrap').remove()">${ic('x',13)}</button></div>${body}</div>`;
  document.body.appendChild(wrap);
}

function calcProjFiscal(){
  const base=parseFloat($('pr_vl')?.value||0);
  const iva=parseFloat($('pr_iva')?.value||0);
  const retiva=parseFloat($('pr_retiva')?.value||0);
  const retrenta=parseFloat($('pr_retrenta')?.value||0);
  const el=$('proj_fiscal_result');if(!el)return;
  if(!base||base<=0){el.innerHTML='<span style="color:var(--txt3)">Ingresa el valor del contrato para ver el desglose</span>';return;}
  const ivaAmt=round2(base*iva/100);const total=round2(base+ivaAmt);
  const retIvaAmt=round2(ivaAmt*retiva/100);const retRentaAmt=round2(base*retrenta/100);const neto=round2(total-retIvaAmt-retRentaAmt);
  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px">
      ${[['Subtotal',fmtM(base),'var(--txt2)'],['+ IVA '+iva+'%',fmtM(ivaAmt),'var(--accent)'],['Total c/IVA',fmtM(total),'var(--txt)']].map(([l,v,col])=>`<div style="background:var(--bg2);border-radius:var(--r);padding:7px 9px;border:1px solid var(--border)"><div style="font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px">${l}</div><div style="font-size:12px;font-weight:700;color:${col}">${v}</div></div>`).join('')}
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:14px;font-size:11.5px">
        <span style="color:var(--red)">− Ret.Renta ${retrenta}%: <strong>-${fmtM(retRentaAmt)}</strong></span>
        <span style="color:var(--red)">− Ret.IVA ${retiva}%: <strong>-${fmtM(retIvaAmt)}</strong></span>
      </div>
      <div style="text-align:right">
        <div style="font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.7px">Neto a mi banco</div>
        <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--accent)">${fmtM(neto)}</div>
      </div>
    </div>`;
}

function previewFoto(input,zoneId,dataId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const data=e.target.result;
    const zone=$(zoneId);if(!zone)return;
    zone.innerHTML=`<img src="${data}" class="foto-thumb"><div style="font-size:10px;color:var(--txt3);margin-top:4px">${file.name}</div>`;
    const di=$(dataId);if(di)di.value=data;
  };
  reader.readAsDataURL(file);
}

function calcTaxSRI(){
  const a=parseFloat($('or_am_sri')?.value||0);
  const ivaPct=parseFloat($('or_iva_pct_sri')?.value||15);
  const retPct=parseFloat($('or_rp_sri')?.value||0);
  const ivaRetPct=parseFloat($('or_ivaret_pct_sri')?.value||30);
  const el=$('sri_desglose');if(!el||!a)return;
  const ivaAmt=round2(a*ivaPct/100);
  const totalConIva=round2(a+ivaAmt);
  const retRenta=round2(a*retPct/100);
  const retIva=round2(ivaAmt*ivaRetPct/100);
  const neto=round2(totalConIva-retRenta-retIva);
  el.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11.5px;margin-bottom:6px">
      <span>Base: <strong>${fmtM(a)}</strong></span>
      <span style="color:var(--accent)">+IVA: <strong>+${fmtM(ivaAmt)}</strong></span>
      <span style="font-weight:700">Total c/IVA: <strong>${fmtM(totalConIva)}</strong></span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11.5px;margin-bottom:8px">
      <span style="color:var(--red)">−Ret.Renta: <strong>-${fmtM(retRenta)}</strong></span>
      <span style="color:var(--red)">−Ret.IVA: <strong>-${fmtM(retIva)}</strong></span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--green-pale);border-radius:var(--r);padding:7px 10px;border:1px solid #b8ddc2">
      <span style="font-size:11px;font-weight:700;color:var(--txt3)">NETO A MI BANCO</span>
      <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--accent)">${fmtM(neto)}</span>
    </div>
  </div>`;
}

async function addAnticipo(orderId,pagado){

  toast(pagado?'Anticipo registrado como recibido':'Anticipo registrado como pendiente');

  openAnticiposModal(orderId);

  render();
}

function calcInvModal(){
  const base=parseFloat($('inv_sub')?.value||0);const iva=parseFloat($('inv_iva_pct')?.value||0);
  const ret=parseFloat($('inv_ret_pct')?.value||0);const retiva=parseFloat($('inv_retiva_pct')?.value||0);
  const el=$('inv_summary');if(!el)return;
  if(!base||base<=0){el.innerHTML='<div style="text-align:center;padding:12px;color:var(--txt3);font-size:12px">Ingresa el subtotal para ver el desglose</div>';if($('inv_total'))$('inv_total').value='';return;}
  const c=calcInvoice(base,iva,ret,retiva);
  if($('inv_total'))$('inv_total').value=c.totalConIva.toFixed(2);
  el.innerHTML=invSummaryHTML(c,iva,ret,retiva);
}
function calcFromTotal(){const total=parseFloat($('inv_total')?.value||0);const iva=parseFloat($('inv_iva_pct')?.value||0);if(!total||total<=0||iva<0)return;const base=round2(total/(1+iva/100));if($('inv_sub'))$('inv_sub').value=base.toFixed(2);calcInvModal();}

  if(!pid||!ttl){toast('Completa los campos obligatorios','te');return;}
  const d={project_id:pid,title:ttl,description:$('t_dsc')?.value||null,step_order:parseInt($('t_ord')?.value)||1,due_date:$('t_dt')?.value||null,due_time:$('t_tm')?.value||null,location:$('t_loc')?.value||null};
  if(tid){await dbUpdate('tasks',tid,d);}else{await dbInsert('tasks',{...d,done:false});}
  toast(tid?'Tarea actualizada':'Tarea registrada');document.getElementById('task_wrap')?.remove();render();
}
async function toggleTask(id,done){await dbUpdate('tasks',id,{done,done_at:done?new Date().toISOString():null});render();}
async function deleteTask(id){if(!confirm('¿Eliminar tarea?'))return;await dbDelete('tasks',id);toast('Tarea eliminada');render();}

async function saveClient(cid){
  const nm=$('cl_nm')?.value?.trim();const ru=$('cl_ru')?.value?.trim();

  const d={name:nm,ruc:ru,rep:$('cl_rp')?.value||null,cedula:$('cl_cd')?.value||null};

async function deleteClient(id){

  if(!confirm('¿Eliminar cliente?'))return;await dbDelete('clients',id);toast('Cliente eliminado');render();
}

async function saveProject(pid){
  if(_isSavingProject){toast('Guardando…','ti2');return;}_isSavingProject=true;
  const btn=$('save_proj_btn');if(btn){btn.disabled=true;btn.textContent='Guardando…';}
  const cl=$('pr_cl')?.value;const nm=$('pr_nm')?.value?.trim();const s=$('pr_s')?.value;
  if(!cl||!nm||!s){toast('Completa los campos obligatorios','te');_isSavingProject=false;if(btn){btn.disabled=false;btn.textContent='Guardar proyecto';}return;}
  const rows=document.querySelectorAll('#prows>div');const sched=[];let tot=0;
  rows.forEach(r=>{const ins=r.querySelectorAll('input');const pct=parseFloat(ins[0]?.value||0);const lbl=ins[1]?.value?.trim();const dt=ins[2]?.value;if(pct>0&&lbl){sched.push({pct,label:lbl,due_date:dt||null,paid:false});tot+=pct;}});
  // Cronograma es opcional — si hay cuotas deben sumar 100%
  if(sched.length&&Math.abs(tot-100)>.5){toast('Si agregas cuotas deben sumar 100%','te');_isSavingProject=false;if(btn){btn.disabled=false;btn.textContent='Guardar proyecto';}return;}
  const pd={client_id:cl,name:nm,start_date:s,end_date:$('pr_e')?.value||null,contract_value:parseFloat($('pr_vl')?.value)||0,notes:$('pr_nt')?.value||null};
  if(pid){await dbUpdate('projects',pid,pd);const old=DB.payment_schedule.filter(x=>x.project_id===pid);for(const x of old)await dbDelete('payment_schedule',x.id);for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:pid});}
  else{const np=await dbInsert('projects',{...pd,code:await nextCode('PROJ'),status:'active'});if(np&&sched.length)for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:np.id});}
  toast(pid?'Proyecto actualizado':'Proyecto creado');document.getElementById('project_wrap')?.remove();_isSavingProject=false;render();
}
async function chgProjStatus(id,status){await dbUpdate('projects',id,{status});toast('Estado actualizado');render();}
async function deleteProject(id){
  if(!confirm('¿Eliminar proyecto, tareas y órdenes?'))return;
  const pt=DB.tasks.filter(t=>t.project_id===id);const po=DB.orders.filter(o=>o.project_id===id);const pps=DB.payment_schedule.filter(x=>x.project_id===id);
  for(const t of pt)await dbDelete('tasks',t.id);for(const o of po)await dbDelete('orders',o.id);for(const x of pps)await dbDelete('payment_schedule',x.id);
  await dbDelete('projects',id);toast('Proyecto eliminado');render();
}
async function togglePS(id,paid){await dbUpdate('payment_schedule',id,{paid,paid_at:paid?new Date().toISOString():null});render();}

// SAVE ORDER — nueva lógica 3 tipos
async function saveOrder(oid=''){
  const bt=$('order_billing_type')?.value||'factura_sri';
  let pid,cn,am,dt,status,inv_num=null,foto_url=null,neto_banco=null;
  let hasIva=false,ivaPct=0,ivaAmt=0,hasRet=false,retPct=0,retAmt=0,hasIvaRet=false,ivaRetPct=0,ivaRetAmt=0;
  let expCat=null;

  if(bt==='factura_sri'){
    pid=$('or_pj_sri')?.value||null;
    cn=$('or_cn_sri')?.value?.trim();
    am=parseFloat($('or_am_sri')?.value||0);
    dt=$('or_dt_sri')?.value||today();
    status=$('or_st_sri')?.value||'pending';
    inv_num=$('or_iv_sri')?.value?.trim()||null;
    ivaPct=parseFloat($('or_iva_pct_sri')?.value||15);
    retPct=parseFloat($('or_rp_sri')?.value||0);
    ivaRetPct=parseFloat($('or_ivaret_pct_sri')?.value||30);
    hasIva=ivaPct>0;hasRet=retPct>0;hasIvaRet=ivaRetPct>0;
    ivaAmt=round2(am*ivaPct/100);
    const totalConIva=round2(am+ivaAmt);
    retAmt=round2(am*retPct/100);
    ivaRetAmt=round2(ivaAmt*ivaRetPct/100);
    neto_banco=round2(totalConIva-retAmt-ivaRetAmt);
    foto_url=$('foto_data_sri')?.value||null;
    if(!cn||!am){toast('Completa concepto y monto','te');return;}
  } else if(bt==='gasto'){
    pid=$('or_pj_gasto')?.value||null;
    cn=$('or_cn_gasto')?.value?.trim();
    am=parseFloat($('or_am_gasto')?.value||0);
    dt=$('or_dt_gasto')?.value||today();
    status=$('or_st_gasto')?.value||'pending';
    inv_num=$('or_iv_gasto')?.value?.trim()||null;
    expCat=$('or_cat_gasto')?.value||null;
    foto_url=$('foto_data_gasto')?.value||null;
    if(!cn||!am){toast('Completa concepto y monto','te');return;}
  } else {
    // sin_factura
    pid=$('or_pj_nofac')?.value||null;
    cn=$('or_cn_nofac')?.value?.trim();
    am=parseFloat($('or_am_nofac')?.value||0);
    dt=$('or_dt_nofac')?.value||today();
    status=$('or_st_nofac')?.value||'pending';
    neto_banco=am;
    if(!cn||!am){toast('Completa concepto y monto','te');return;}
  }

  const isIncome=bt!=='gasto';
  const d={
    project_id:pid,
    type:isIncome?'income':'expense',
    billing_type:bt,
    concept:cn,
    amount:am,
    neto_banco:isIncome?(neto_banco||am):null,
    order_date:dt,
    status,
    invoice_num:inv_num,
    has_iva:hasIva,iva_pct:ivaPct,iva_amount:ivaAmt,
    has_retention:hasRet,retention_pct:retPct,retention_amount:retAmt,
    has_iva_retention:hasIvaRet,iva_retention_pct:ivaRetPct,iva_retention_amount:ivaRetAmt,
    expense_category:expCat,
    foto_url
  };

  // Si es factura SRI, buscar factura por número y enlazar
  if(bt==='factura_sri'&&inv_num){
    const invMatch=DB.invoices.find(x=>x.number===inv_num);
    if(invMatch)d.invoice_id=invMatch.id;
  }

  if(oid){await dbUpdate('orders',oid,d);toast('Orden actualizada');}
  else{d.code=await nextCode(isIncome?'ODC':'ODP');await dbInsert('orders',d);toast('Orden registrada');}
  document.getElementById('order_wrap')?.remove();render();
}

async function toggleOrder(id,cur){const ns=cur==='paid'?'pending':'paid';await dbUpdate('orders',id,{status:ns,paid_at:ns==='paid'?new Date().toISOString():null});render();}

async function saveQuote(qid,status){
  const rec=$('q_rec')?.value?.trim();const sub=$('q_sub')?.value?.trim();const body=$('q_body')?.innerHTML||'';
  if(!rec){toast('Ingresa el destinatario','te');return;}
  const d={recipient:rec,subject:sub,body,date:$('q_dt')?.value||today(),valid_until:$('q_vld')?.value||null,notes:$('q_notes')?.value||null,status};
  let saved;
  if(qid){await dbUpdate('quotes',qid,d);saved={id:qid,...d};}
  else{d.code=await nextCode('COT');saved=await dbInsert('quotes',d);}
  toast(status==='sent'?'Cotización emitida':'Borrador guardado');document.getElementById('quote_edit_wrap')?.remove();render();
  if(status==='sent'&&saved)setTimeout(()=>printQuote(saved.id||qid),300);
}
async function deleteQuote(id){if(!confirm('¿Eliminar?'))return;await dbDelete('quotes',id);toast('Eliminada');render();}

function requestNotifPermission(){
  if('Notification'in window&&Notification.permission==='default'){Notification.requestPermission().then(p=>{if(p==='granted'){toast('Notificaciones activadas');scheduleNotifs();}});}
}
function scheduleNotifs(){
  DB.tasks.filter(t=>!t.done&&t.due_date).forEach(t=>{
    const diff=Math.round((new Date(t.due_date+'T12:00:00')-new Date())/86400000);
    if((diff===0||diff===1)&&Notification.permission==='granted')new Notification('Oceango',{body:diff===0?`HOY: ${t.title}`:`MAÑANA: ${t.title}`});
  });
}
