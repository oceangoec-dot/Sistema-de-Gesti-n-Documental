<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceango · Sistema de Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dk:#0a3628;--mid:#1a5c45;--base:#2d8c6e;--light:#4fbf99;
  --teal:#3ec8c0;--tl:#a8ede9;--tp:#e0f7f6;
  --bg:#f0faf8;--wh:#fff;--br:#c8ede6;
  --tx:#0a3628;--mu:#4a7c6b;--so:#8ab8ac;
  --re:#dc2626;--rb:#fee2e2;--rt:#991b1b;
  --yb:#fef3c7;--yt:#92400e;
  --bb:#dbeafe;--bt:#1e40af;
  --gb:#d1fae5;--gt:#065f46;
  --r:10px;--rs:6px
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sb{width:224px;background:var(--dk);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-name{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1}
.logo-name span{color:var(--tl)}
.logo-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;
  color:rgba(255,255,255,.55);font-size:13px;font-weight:500;transition:all .15s;
  margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.ni.on{background:var(--base);color:#fff}
.ni svg{width:17px;height:17px;flex-shrink:0}
.nbadge{background:var(--teal);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;margin-left:auto}
.sbfoot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--br);padding:0 24px;height:56px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ptitle{font-family:'Sora',sans-serif;font-size:17px;font-weight:600;color:var(--dk)}
.dchip{font-size:12px;color:var(--mu);background:var(--bg);padding:4px 12px;border-radius:20px;border:1px solid var(--br)}
.content{flex:1;overflow-y:auto;padding:24px}
.btn{padding:7px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;line-height:1}
.bp{background:var(--base);color:#fff}.bp:hover{background:var(--mid)}
.bo{background:transparent;border:1px solid var(--br);color:var(--mid)}.bo:hover{background:var(--tp)}
.bd{background:var(--rb);color:var(--rt)}.bd:hover{background:#fecaca}
.bsm{padding:5px 10px;font-size:12px}.bxs{padding:3px 7px;font-size:11px}
.card{background:#fff;border:1px solid var(--br);border-radius:var(--r);padding:20px}
.csm{padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tg{background:var(--gb);color:var(--gt)}.ty{background:var(--yb);color:var(--yt)}
.tb{background:var(--bb);color:var(--bt)}.tr{background:var(--rb);color:var(--rt)}
.tgr{background:#f1f5f9;color:#475569}.ttl{background:var(--tp);color:var(--mid)}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--so);margin-bottom:6px}
.val{font-family:'Sora',sans-serif;font-size:24px;font-weight:700;color:var(--dk)}
.pb{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--base),var(--teal));border-radius:4px;transition:width .5s}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--so);border-bottom:1px solid var(--br)}
.tbl td{padding:11px 12px;border-bottom:1px solid #f1f5f9;color:var(--tx);vertical-align:middle}
.tbl tr:hover td{background:var(--bg)}
.tbl tr:last-child td{border-bottom:none}
.tw{overflow-x:auto}
.fg{margin-bottom:13px}
.fl{font-size:12px;font-weight:600;color:var(--mu);margin-bottom:5px;display:block}
.fi{width:100%;padding:8px 10px;border:1px solid var(--br);border-radius:var(--rs);
  font-size:13px;font-family:inherit;color:var(--tx);background:#fff;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--base);box-shadow:0 0 0 3px rgba(45,140,110,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:var(--r);padding:24px;width:600px;max-width:100%;
  max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{width:860px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt{font-family:'Sora',sans-serif;font-size:17px;font-weight:600;color:var(--dk)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--br)}
.div{height:1px;background:var(--br);margin:16px 0}
.stitle{font-family:'Sora',sans-serif;font-size:14px;font-weight:600;color:var(--dk);margin-bottom:12px}
.ti{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--rs);
  border:1px solid var(--br);margin-bottom:8px;background:#fff;transition:all .15s}
.ti:hover{border-color:var(--base);background:var(--tp)}
.ti.done{opacity:.5}
.chk{width:18px;height:18px;border-radius:4px;border:2px solid var(--br);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px}
.chk.on{background:var(--base);border-color:var(--base)}
/* CALENDAR */
.cal-wrap{background:#fff;border:1px solid var(--br);border-radius:var(--r);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--dk);color:#fff}
.cal-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:600}
.cal-nav{background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;padding:5px 10px;border-radius:6px;font-size:14px;font-family:inherit;transition:background .15s}
.cal-nav:hover{background:rgba(255,255,255,.25)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{text-align:center;font-size:11px;font-weight:600;color:var(--so);padding:8px 4px;background:#f8fdfc;border-bottom:1px solid var(--br);text-transform:uppercase}
.cal-day{min-height:80px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;padding:6px;cursor:pointer;transition:background .1s;position:relative}
.cal-day:hover{background:var(--tp)}
.cal-day.today{background:#e0f7f6}
.cal-day.today .cal-dn{color:var(--base);font-weight:700}
.cal-day.other-month{opacity:.35}
.cal-day:nth-child(7n){border-right:none}
.cal-dn{font-size:12px;font-weight:500;color:var(--mu);margin-bottom:3px}
.cal-ev{background:var(--base);color:#fff;border-radius:3px;padding:2px 5px;
  font-size:10px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;line-height:1.4}
.cal-ev:hover{background:var(--mid)}
.cal-ev.urgent{background:#dc2626}
.cal-ev.done-ev{background:var(--so)}
/* TOAST */
.twrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;color:#fff;animation:sin .25s ease;max-width:300px}
.ts{background:var(--base)}.te{background:var(--re)}.ti2{background:#3b82f6}
@keyframes sin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:48px 20px;color:var(--mu)}
.ei{font-size:36px;margin-bottom:10px;opacity:.4}
/* QUOTE EDITOR */
.quote-editor{border:1px solid var(--br);border-radius:6px;min-height:200px;padding:12px;
  font-size:13px;font-family:inherit;outline:none;line-height:1.5;color:var(--tx)}
.quote-editor:focus{border-color:var(--base);box-shadow:0 0 0 3px rgba(45,140,110,.1)}
.quote-editor p{margin:0 0 4px 0}
.quote-editor br{display:none}
.editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding:8px;background:#f8fdfc;border:1px solid var(--br);border-radius:6px}
.tb-btn{padding:4px 8px;border:1px solid var(--br);border-radius:4px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:var(--mu);transition:all .1s}
.tb-btn:hover{background:var(--tp);border-color:var(--base)}
/* TASK DETAIL MODAL */
.task-detail .td-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px}
.task-detail .td-label{font-weight:600;color:var(--mu);min-width:80px;font-size:12px}
/* NOTIF BANNER */
.notif-bar{background:linear-gradient(135deg,var(--mid),var(--base));color:#fff;padding:8px 24px;
  font-size:12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.notif-bar.hide{display:none}
/* TAX SECTION */
.tax-section{background:#f8fdfc;border:1px solid var(--br);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.tax-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.tax-row:last-child{margin-bottom:0}
.tax-label{display:flex;align-items:center;gap:6px;cursor:pointer;min-width:160px}
.tax-amount{font-weight:600;color:var(--base);margin-left:auto;font-size:12px}
/* PDF TEMPLATE */
.tpl-zone{border:2px dashed var(--br);border-radius:var(--r);padding:32px 20px;text-align:center;
  transition:all .2s;cursor:pointer;background:#fafffe;position:relative}
.tpl-zone:hover,.tpl-zone.drag{border-color:var(--base);background:var(--tp)}
.tpl-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.tpl-preview{border:1px solid var(--br);border-radius:8px;overflow:hidden;max-height:200px;display:flex;align-items:center;justify-content:center;background:#f1f5f9}
.tpl-preview img{width:100%;height:200px;object-fit:contain}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}}
@media(max-width:640px){
  .sb{width:54px}.logo-name,.logo-sub,.sbfoot,.ni span:not(.nbadge){display:none}
  .ni{justify-content:center}.g2,.g4{grid-template-columns:1fr}.fr,.fr3{grid-template-columns:1fr}
  .modal{padding:16px}.content{padding:16px}
}
@media print{
  .sb,.topbar,.notif-bar,.twrap{display:none!important}
  .main{overflow:visible}
  .content{padding:0;overflow:visible}
  body{overflow:visible}
}
</style>

const TPL_KEY='oceango_quote_template_v1';

function getTemplate(){
  try{const s=localStorage.getItem(TPL_KEY);return s?JSON.parse(s):null;}
  catch{return null;}
}

function saveTemplate(pages){
  // pages = array of base64 data URLs (one per PDF page, rendered as images)
  try{
    localStorage.setItem(TPL_KEY,JSON.stringify({pages,updatedAt:new Date().toISOString()}));
    toast('Plantilla guardada correctamente');
    render();
  }catch(e){
    toast('Error: la plantilla es demasiado grande para localStorage. Intenta con un PDF más liviano.','te');
  }
}

function clearTemplate(){
  localStorage.removeItem(TPL_KEY);
  toast('Plantilla eliminada');
  render();
}

// Convierte PDF a imágenes usando pdf.js (CDN)
async function processPDFTemplate(file){
  toast('Procesando PDF…','ti2');
  try{
    // Load pdf.js
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    const arrayBuffer=await file.arrayBuffer();
    const pdfDoc=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    const pages=[];

    for(let i=1;i<=pdfDoc.numPages;i++){
      const page=await pdfDoc.getPage(i);
      // Render at 2x scale for print quality (A4 @ 150dpi roughly)
      const scale=2.0;
      const vp=page.getViewport({scale});
      const canvas=document.createElement('canvas');
      canvas.width=vp.width;canvas.height=vp.height;
      const ctx=canvas.getContext('2d');
      await page.render({canvasContext:ctx,viewport:vp}).promise;
      pages.push(canvas.toDataURL('image/jpeg',0.92));
    }

    saveTemplate(pages);
  }catch(e){
    console.error(e);
    toast('Error al procesar PDF. Intenta con otro archivo.','te');
  }
}

function nextCode(prefix){
  const key=`oceango_seq_${prefix}`;
  const n=(parseInt(localStorage.getItem(key)||'0'))+1;
  localStorage.setItem(key,n);
  return `${prefix}-${String(n).padStart(4,'0')}-${new Date().getFullYear()}`;
}

async function dbInsert(table,row){
  const r={...row,id:uid(),created_at:new Date().toISOString()};
  DB[table]=[...(DB[table]||[]),r];saveDB();return r;
}
async function dbUpdate(table,id,changes){
  DB[table]=DB[table].map(r=>r.id===id?{...r,...changes,updated_at:new Date().toISOString()}:r);saveDB();return true;
}
async function dbDelete(table,id){DB[table]=DB[table].filter(r=>r.id!==id);saveDB();return true;}

function requestNotifPermission(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted'){toast('Notificaciones activadas');scheduleNotifs();}});
  }
}
function scheduleNotifs(){
  DB.tasks.filter(t=>!t.done&&t.due_date).forEach(t=>{
    const diff=Math.round((new Date(t.due_date+'T12:00:00')-new Date())/86400000);
    if((diff===0||diff===1)&&Notification.permission==='granted'){
      new Notification('Oceango — Tarea próxima',{body:diff===0?`HOY: ${t.title}${t.due_time?' a las '+t.due_time.slice(0,5):''}`:
        `MAÑANA: ${t.title}`});
    }
  });
}

function renderCalendar(){
  const yr=S.calYear,mo=S.calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const td=today();
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cells='';
  for(let i=0;i<firstDay;i++){const prevDays=new Date(yr,mo,0).getDate();cells+=`<div class="cal-day other-month"><div class="cal-dn">${prevDays-firstDay+i+1}</div></div>`;}
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===td;
    const evts=DB.tasks.filter(t=>t.due_date===ds);
    const evHTML=evts.map(e=>`<div class="cal-ev ${e.done?'done-ev':e.due_date<td?'urgent':''}" onclick="event.stopPropagation();showTaskDetail('${e.id}')" title="${e.title}">${e.due_time?e.due_time.slice(0,5)+' ':''}${e.title}</div>`).join('');
    cells+=`<div class="cal-day${isT?' today':''}"><div class="cal-dn">${d}</div>${evHTML}</div>`;
  }
  const remaining=(7-(firstDay+daysInMonth)%7)%7;
  for(let i=1;i<=remaining;i++)cells+=`<div class="cal-day other-month"><div class="cal-dn">${i}</div></div>`;
  return `<div class="cal-wrap" style="margin-bottom:0">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">&#8249;</button>
      <div class="cal-title">${MONTHS[mo]} ${yr}</div>
      <button class="cal-nav" onclick="calNav(1)">&#8250;</button>
    </div>
    <div class="cal-grid">
      ${days.map(d=>`<div class="cal-dh">${d}</div>`).join('')}
      ${cells}
    </div>
  </div>`;
}

function calNav(dir){
  S.calMonth+=dir;
  if(S.calMonth>11){S.calMonth=0;S.calYear++;}
  if(S.calMonth<0){S.calMonth=11;S.calYear--;}
  render();
}

function showTaskDetail(tid){

  const proj=DB.projects.find(p=>p.id===t.project_id);
  const cl=DB.clients.find(c=>c.id===proj?.client_id);
  const diff=t.due_date?Math.round((new Date(t.due_date+'T12:00:00')-new Date())/86400000):null;
  const dlTag=diff===null?'':diff===0?`<span class="tag tg">Hoy</span>`:diff===1?`<span class="tag ty">Mañana</span>`:diff<0?`<span class="tag tr">Vencida hace ${Math.abs(diff)} días</span>`:`<span class="tag ttl">En ${diff} días</span>`;
  const wrap=document.createElement('div');wrap.className='ov';wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.innerHTML=`<div class="modal">
    <div class="mh"><div class="mt">${ic('tasks',16)} Detalle de Tarea</div>
      <button class="btn bo bxs" onclick="this.closest('.ov').remove()">${ic('x',14)}</button></div>
    <div class="task-detail">
      <div style="font-family:Sora;font-weight:600;font-size:16px;color:var(--dk);margin-bottom:12px">${t.step_order||'·'}. ${t.title}</div>
      <div class="td-row"><span class="td-label">Estado</span><span class="tag ${t.done?'tg':'ty'}">${t.done?'Completada':'Pendiente'}</span> ${dlTag}</div>
      ${t.description?`<div class="td-row"><span class="td-label">Descripción</span><span style="color:var(--mu)">${t.description}</span></div>`:''}
      <div class="td-row"><span class="td-label">Proyecto</span><span class="tag ttl">${proj?.name||'—'}</span></div>
      <div class="td-row"><span class="td-label">Cliente</span><span>${cl?.name||'—'}</span></div>
      ${t.due_date?`<div class="td-row"><span class="td-label">Fecha</span><span>${fmtD(t.due_date)}${t.due_time?' a las '+t.due_time.slice(0,5):''}</span></div>`:''}
      ${t.location?`<div class="td-row"><span class="td-label">Ubicación</span><span>${ic('pin',13)} ${t.location}</span></div>`:''}
    </div>
    <div class="mf">

      <button class="btn bp" onclick="this.closest('.ov').remove();openTaskModal('${t.id}')">${ic('edit',14)} Editar</button>

    </div>
  </div>`;
  document.body.appendChild(wrap);
}

function renderFinance(){

// ============================================================
//  TEMPLATE FILE HANDLER
// ============================================================
function handleTplFile(file){
  if(!file)return;
  if(file.type!=='application/pdf'){toast('Solo se aceptan archivos PDF','te');return;}
  processPDFTemplate(file);
}

// Drag & Drop para la zona de plantilla
document.addEventListener('dragover',e=>{
  const zone=document.getElementById('tpl_drop');
  if(zone){e.preventDefault();zone.classList.add('drag');}
});
document.addEventListener('dragleave',()=>{
  const zone=document.getElementById('tpl_drop');
  if(zone)zone.classList.remove('drag');
});
document.addEventListener('drop',e=>{
  const zone=document.getElementById('tpl_drop');
  if(!zone)return;
  e.preventDefault();zone.classList.remove('drag');
  const file=e.dataTransfer?.files?.[0];
  if(file)handleTplFile(file);
});

function modal(id,title,body,large=false){
  document.getElementById(id+'_wrap')?.remove();

  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.innerHTML=`<div class="modal${large?' modal-lg':''}">
    <div class="mh"><div class="mt">${title}</div>
      <button class="btn bo bxs" onclick="document.getElementById('${id}_wrap').remove()">${ic('x',14)}</button></div>
    ${body}

  document.body.appendChild(wrap);
}

function togInv(){
  const t=$('or_tp')?.value;
  const g=$('or_inv_g');
  if(g)g.style.display=t==='income'?'block':'none';
}

function calcTax(){
  const a=parseFloat($('or_am')?.value||0);
  if(!a)return;
  const hasIva=$('or_iva')?.checked;
  const hasRet=$('or_ret')?.checked;
  const hasIvaRet=$('or_ivaret')?.checked;
  const rp=parseFloat($('or_rp')?.value||0);
  const ivaAmt=hasIva?a*0.15:0;
  const retAmt=hasRet&&rp?a*rp/100:0;
  const ivaRetAmt=hasIvaRet?ivaAmt:0;
  const ivaShow=$('iva_show');
  if(ivaShow){ivaShow.style.display=hasIva?'inline':'none';ivaShow.textContent=fmtM(ivaAmt);}
  const retShow=$('ret_show');
  if(retShow){retShow.style.display=hasRet?'inline':'none';retShow.textContent='-'+fmtM(retAmt);}
  const ivaRetShow=$('ivaret_show');
  if(ivaRetShow){ivaRetShow.style.display=hasIvaRet?'inline':'none';ivaRetShow.textContent='-'+fmtM(ivaRetAmt);}
  const summary=$('tax_summary');const lines=$('tax_lines');const totalEl=$('tax_total');
  if(!summary)return;
  if(!hasIva&&!hasRet&&!hasIvaRet){summary.style.display='none';return;}
  let linesHTML=`<span>Base: ${fmtM(a)}</span>`;
  if(hasIva)linesHTML+=` &nbsp;+&nbsp; <span>IVA 15%: +${fmtM(ivaAmt)}</span>`;
  if(hasRet&&rp)linesHTML+=` &nbsp;-&nbsp; <span>Ret. ${rp}%: -${fmtM(retAmt)}</span>`;
  if(hasIvaRet)linesHTML+=` &nbsp;-&nbsp; <span>Ret. IVA 100%: -${fmtM(ivaRetAmt)}</span>`;
  const net=a+ivaAmt-retAmt-ivaRetAmt;
  if(lines)lines.innerHTML=linesHTML;
  if(totalEl)totalEl.textContent=`Neto a ${$('or_tp')?.value==='income'?'cobrar':'pagar'}: ${fmtM(net)}`;
  summary.style.display='block';
}

function addPR(){
  const n=window._prc||0;
  const d=document.createElement('div');d.id=`pr_${n}`;
  d.style.cssText='display:grid;grid-template-columns:70px 1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center';
  d.innerHTML=`<input class="fi" type="number" placeholder="%" min="0" max="100" oninput="calcPT()">
    <input class="fi" placeholder="Etapa..."><input class="fi" type="date">
    <button class="btn bd bxs" onclick="rmPR('pr_${n}')">${ic('x',12)}</button>`;
  $('prows')?.appendChild(d);window._prc=n+1;
}
function rmPR(id){$(id)?.remove();calcPT();}
function calcPT(){
  const rows=document.querySelectorAll('#prows>div');let tot=0;
  rows.forEach(r=>tot+=parseFloat(r.querySelector('input')?.value||0));
  const m=$('ptmsg');if(m){const ok=Math.abs(tot-100)<.5;m.textContent=`Total: ${tot}% ${ok?'✓':'(debe sumar 100%)'}`;m.style.color=ok?'var(--base)':'var(--re)';}
}

async function saveTask(tid){
  const pid=$('t_proj')?.value;const ttl=$('t_ttl')?.value?.trim();
  if(!pid||!ttl){toast('Completa los campos obligatorios','te');return;}
  const d={project_id:pid,title:ttl,description:$('t_dsc')?.value||null,
    step_order:parseInt($('t_ord')?.value)||1,due_date:$('t_dt')?.value||null,
    due_time:$('t_tm')?.value||null,location:$('t_loc')?.value||null};
  if(tid){await dbUpdate('tasks',tid,d);}else{await dbInsert('tasks',{...d,done:false});}
  toast(tid?'Tarea actualizada':'Tarea registrada');
  document.getElementById('task_wrap')?.remove();render();
}
async function toggleTask(id,done){await dbUpdate('tasks',id,{done,done_at:done?new Date().toISOString():null});render();}
async function deleteTask(id){if(!confirm('¿Eliminar tarea?'))return;await dbDelete('tasks',id);toast('Tarea eliminada');render();}

async function saveClient(cid){
  const nm=$('cl_nm')?.value?.trim();const ru=$('cl_ru')?.value?.trim();
  if(!nm||!ru){toast('Nombre y RUC son obligatorios','te');return;}
  const d={name:nm,ruc:ru,rep:$('cl_rp')?.value||null,cedula:$('cl_cd')?.value||null};
  if(cid){await dbUpdate('clients',cid,d);}else{await dbInsert('clients',d);}
  toast(cid?'Cliente actualizado':'Cliente registrado');
  document.getElementById('client_wrap')?.remove();render();
}
async function deleteClient(id){
  if(DB.projects.some(p=>p.client_id===id)){toast('Cliente tiene proyectos asociados','te');return;}
  if(!confirm('¿Eliminar cliente?'))return;
  await dbDelete('clients',id);toast('Cliente eliminado');render();
}

async function saveProject(pid){
  const cl=$('pr_cl')?.value;const nm=$('pr_nm')?.value?.trim();const s=$('pr_s')?.value;
  if(!cl||!nm||!s){toast('Completa los campos obligatorios','te');return;}
  const rows=document.querySelectorAll('#prows>div');
  const sched=[];let tot=0;
  rows.forEach(r=>{
    const ins=r.querySelectorAll('input');
    const pct=parseFloat(ins[0]?.value||0);const lbl=ins[1]?.value?.trim();const dt=ins[2]?.value;
    if(pct>0&&lbl){sched.push({pct,label:lbl,due_date:dt||null,paid:false});tot+=pct;}
  });
  if(sched.length&&Math.abs(tot-100)>.5){toast('Porcentajes deben sumar 100%','te');return;}
  const pd={client_id:cl,name:nm,start_date:s,end_date:$('pr_e')?.value||null,
    contract_value:parseFloat($('pr_vl')?.value)||0,notes:$('pr_nt')?.value||null};
  if(pid){
    await dbUpdate('projects',pid,pd);
    DB.payment_schedule=DB.payment_schedule.filter(x=>x.project_id!==pid);saveDB();
    for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:pid});
  }else{
    const np=await dbInsert('projects',{...pd,code:nextCode('PROJ'),status:'active'});
    if(np)for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:np.id});
  }
  toast(pid?'Proyecto actualizado':'Proyecto creado');
  document.getElementById('project_wrap')?.remove();render();
}
async function chgProjStatus(id,status){await dbUpdate('projects',id,{status});toast('Estado actualizado');render();}
async function deleteProject(id){
  if(!confirm('¿Eliminar proyecto, tareas y órdenes?'))return;
  DB.tasks=DB.tasks.filter(t=>t.project_id!==id);
  DB.orders=DB.orders.filter(o=>o.project_id!==id);
  DB.payment_schedule=DB.payment_schedule.filter(x=>x.project_id!==id);
  saveDB();await dbDelete('projects',id);toast('Proyecto eliminado');render();
}
async function togglePS(id,paid){await dbUpdate('payment_schedule',id,{paid,paid_at:paid?new Date().toISOString():null});render();}

async function saveOrder(oid=''){
  const pid=$('or_pj')?.value;const cn=$('or_cn')?.value?.trim();const am=parseFloat($('or_am')?.value||0);
  if(!pid||!cn||!am){toast('Completa los campos obligatorios','te');return;}
  const tp=$('or_tp')?.value;
  const hasIva=$('or_iva')?.checked||false;
  const hasRet=$('or_ret')?.checked||false;
  const hasIvaRet=$('or_ivaret')?.checked||false;
  const retPct=hasRet?parseFloat($('or_rp')?.value||0):0;
  const ivaAmt=hasIva?am*0.15:0;
  const retAmt=hasRet?am*retPct/100:0;
  const ivaRetAmt=hasIvaRet?ivaAmt:0;
  const d={
    project_id:pid,type:tp,concept:cn,amount:am,order_date:$('or_dt')?.value||today(),
    status:$('or_st')?.value||'pending',
    invoice_num:tp==='income'?($('or_iv')?.value||null):null,
    has_iva:hasIva,iva_amount:ivaAmt,
    has_retention:hasRet,retention_pct:retPct,retention_amount:retAmt,
    has_iva_retention:hasIvaRet,iva_retention_amount:ivaRetAmt,
    expense_category:$('or_cat')?.value||null
  };
  if(oid){await dbUpdate('orders',oid,d);toast('Orden actualizada');}
  else{d.code=nextCode(tp==='income'?'ODC':'ODP');await dbInsert('orders',d);toast('Orden registrada');}
  document.getElementById('order_wrap')?.remove();render();
}
async function toggleOrder(id,cur){
  const ns=cur==='paid'?'pending':'paid';

}
async function deleteOrder(id){
  if(!confirm('¿Eliminar orden?'))return;
  await dbDelete('orders',id);toast('Orden eliminada');render();
}

async function saveQuote(qid,status){
  const rec=$('q_rec')?.value?.trim();
  const sub=$('q_sub')?.value?.trim();
  const body=$('q_body')?.innerHTML||'';
  if(!rec){toast('Ingresa el destinatario','te');return;}
  const d={recipient:rec,subject:sub,body,date:$('q_dt')?.value||today(),
    valid_until:$('q_vld')?.value||null,notes:$('q_notes')?.value||null,status};
  let saved;
  if(qid){await dbUpdate('quotes',qid,d);saved={id:qid,...d};}
  else{d.code=nextCode('COT');saved=await dbInsert('quotes',d);}
  toast(status==='sent'?'Cotización emitida':'Borrador guardado');
  document.getElementById('quote_edit_wrap')?.remove();
  render();
  if(status==='sent'&&saved)setTimeout(()=>printQuote(saved.id||qid),300);
}
async function deleteQuote(id){
  if(!confirm('¿Eliminar cotización?'))return;
  await dbDelete('quotes',id);toast('Cotización eliminada');render();
}
