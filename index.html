<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceango</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1f21;--ink2:#3d4347;--ink3:#6b737a;--ink4:#9ba3ab;
  --paper:#f7f6f3;--cream:#f0ede7;--white:#ffffff;
  --rule:#d8d3ca;--rule2:#ece9e3;
  --forest:#1a4a35;--pine:#2d7a5a;--sage:#5ba882;--mist:#c8e8db;--fog:#eaf5f0;
  --gold:#b07c2a;--amber:#d4943a;--straw:#f5e9d0;
  --slate:#2a3f5c;--ocean:#3d6494;--sky:#c5d9ef;--haze:#eaf1f9;
  --ruby:#8b2020;--rose:#c0392b;--blush:#f5d0cc;--flush:#fdf0ef;
  --r:6px;--rm:4px;--rl:10px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 0 0 0.5px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
}
body{font-family:'Outfit',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased}

/* ── PIN ── */
#pinLock{position:fixed;inset:0;background:var(--forest);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#pinLock.gone{display:none}
.pin-logo{font-family:'Playfair Display',serif;font-size:38px;font-weight:500;color:#fff;margin-bottom:4px;letter-spacing:-.5px}
.pin-logo span{color:#93ddd8}
.pin-sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.pin-dots{display:flex;gap:16px;margin-bottom:32px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:transparent;transition:all .2s}
.pin-dot.filled{background:#93ddd8;border-color:#93ddd8}
.pin-dot.error{background:#e05252;border-color:#e05252}
.pin-grid{display:grid;grid-template-columns:repeat(3,68px);gap:8px}
.pin-btn{height:68px;border-radius:var(--r);background:rgba(255,255,255,.07);border:0.5px solid rgba(255,255,255,.1);color:#fff;font-size:22px;font-family:'Outfit',sans-serif;font-weight:400;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.pin-btn:hover{background:rgba(255,255,255,.14)}
.pin-btn:active{transform:scale(.95)}
.pin-btn.del{font-size:14px;color:rgba(255,255,255,.4)}
.pin-err{color:#f87171;font-size:12px;margin-top:12px;height:16px;text-align:center;letter-spacing:.5px}

/* ── LOADING ── */
#loadingScreen{position:fixed;inset:0;background:var(--forest);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loadingScreen.fade{opacity:0;pointer-events:none}
.load-logo{font-family:'Playfair Display',serif;font-size:28px;color:#fff;margin-bottom:6px}
.load-logo span{color:#93ddd8}
.load-sub{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px}
.load-bar{width:160px;height:2px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:#93ddd8;animation:lf 1.3s ease forwards}
@keyframes lf{from{width:0}to{width:100%}}
.load-msg{font-size:11px;color:rgba(255,255,255,.25);margin-top:12px;letter-spacing:.5px}

/* ── APP SHELL ── */
.app{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sb{width:224px;background:var(--forest);display:flex;flex-direction:column;flex-shrink:0}
.logo-wrap{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:#fff;line-height:1}
.logo-name span{color:#93ddd8}
.logo-tag{font-size:9px;color:rgba(255,255,255,.22);letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.nav{padding:12px 8px;flex:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.45);font-size:13px;font-weight:400;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;letter-spacing:.1px}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8)}
.ni.on{background:rgba(255,255,255,.12);color:#fff;font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.ni.on svg{opacity:1}
.nbadge{background:var(--rose);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:600;margin-left:auto}
.sbfoot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:9px;color:rgba(255,255,255,.15);letter-spacing:.5px}
.sb-divider{height:1px;background:rgba(255,255,255,.06);margin:4px 8px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--paper)}
.topbar{background:var(--white);border-bottom:1px solid var(--rule2);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ptitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--ink)}
.dchip{font-size:11px;color:var(--ink3);background:var(--paper);padding:4px 12px;border-radius:20px;border:0.5px solid var(--rule);letter-spacing:.2px}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.cfg-banner{padding:7px 24px;font-size:11px;display:flex;align-items:center;gap:8px;flex-shrink:0;letter-spacing:.2px}
.cfg-banner.ok{background:#e8f5ed;color:var(--pine);border-bottom:1px solid #c3e2d0}
.cfg-banner.warn{background:var(--straw);color:var(--gold);border-bottom:1px solid #e8d3a8}
.notif-bar{background:linear-gradient(135deg,var(--slate),var(--ocean));color:#fff;padding:8px 24px;font-size:12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.notif-bar.hide{display:none}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;line-height:1;letter-spacing:.1px}
.bp{background:var(--forest);color:#fff}.bp:hover{background:var(--pine)}
.bo{background:var(--white);border:0.5px solid var(--rule);color:var(--ink2)}.bo:hover{background:var(--paper)}
.bd{background:var(--flush);color:var(--ruby);border:0.5px solid var(--blush)}.bd:hover{background:var(--blush)}
.bam{background:var(--straw);color:var(--gold);border:0.5px solid #e8d3a8}.bam:hover{background:#eedec0}
.bsm{padding:5px 10px;font-size:12px}.bxs{padding:3px 8px;font-size:11px}

/* ── CARDS ── */
.card{background:var(--white);border:0.5px solid var(--rule);border-radius:var(--rl);padding:20px;box-shadow:var(--shadow-sm)}
.csm{padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}

/* ── STATS ── */
.stat-card{background:var(--white);border:0.5px solid var(--rule);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--shadow-sm)}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ink4);margin-bottom:6px}
.stat-val{font-family:'Playfair Display',serif;font-size:24px;font-weight:500;color:var(--ink);line-height:1}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:5px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.2px}
.tg{background:var(--fog);color:var(--pine);border:0.5px solid var(--mist)}
.ty{background:var(--straw);color:var(--gold);border:0.5px solid #e8d3a8}
.tb{background:var(--haze);color:var(--slate);border:0.5px solid var(--sky)}
.tr{background:var(--flush);color:var(--ruby);border:0.5px solid var(--blush)}
.tgr{background:var(--cream);color:var(--ink3);border:0.5px solid var(--rule)}
.tpi{background:var(--pine);color:#fff}

/* ── PROGRESS ── */
.pb{height:4px;background:var(--rule2);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--sage);border-radius:2px;transition:width .5s}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink4);border-bottom:1px solid var(--rule2);background:var(--paper)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--rule2);color:var(--ink);vertical-align:middle}
.tbl tr:hover td{background:var(--paper)}
.tbl tr:last-child td{border-bottom:none}
.tw{overflow-x:auto}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}

/* ── FORM ── */
.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:600;color:var(--ink3);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;padding:8px 10px;border:0.5px solid var(--rule);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--ink);background:var(--white);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--pine);box-shadow:0 0 0 3px rgba(45,122,90,.08)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(28,31,33,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.modal{background:var(--white);border-radius:var(--rl);padding:26px;width:580px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.16);border:0.5px solid var(--rule)}
.modal-lg{width:720px}
.modal-xl{width:920px}
.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.mt{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;color:var(--ink)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--rule2)}
.div{height:1px;background:var(--rule2);margin:16px 0}
.stitle{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:12px}

/* ── TASKS ── */
.ti{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r);border:0.5px solid var(--rule2);margin-bottom:6px;background:var(--white);transition:all .15s}
.ti:hover{border-color:var(--sage);background:var(--fog)}
.ti.done{opacity:.45}
.chk{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--rule);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px}
.chk.on{background:var(--pine);border-color:var(--pine)}

/* ── CALENDAR ── */
.cal-wrap{background:var(--white);border:0.5px solid var(--rule);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow-sm)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--forest);color:#fff}
.cal-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500}
.cal-nav{background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;padding:5px 12px;border-radius:var(--rm);font-size:15px;font-family:inherit;transition:background .15s}
.cal-nav:hover{background:rgba(255,255,255,.2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{text-align:center;font-size:9px;font-weight:600;color:var(--ink4);padding:7px 4px;background:var(--paper);border-bottom:0.5px solid var(--rule2);text-transform:uppercase;letter-spacing:.6px}
.cal-day{min-height:72px;border-right:0.5px solid var(--rule2);border-bottom:0.5px solid var(--rule2);padding:5px 6px;cursor:default;transition:background .1s}
.cal-day:hover{background:var(--fog)}
.cal-day.today{background:#eaf5f0}
.cal-day.other-month{opacity:.25}
.cal-day:nth-child(7n){border-right:none}
.cal-dn{font-size:11px;font-weight:400;color:var(--ink3);margin-bottom:3px;line-height:1}
.cal-ev{background:var(--pine);color:#fff;border-radius:3px;padding:2px 5px;font-size:9px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;line-height:1.5;letter-spacing:.1px}
.cal-ev:hover{background:var(--forest)}
.cal-ev.urgent{background:var(--rose)}
.cal-ev.done-ev{background:var(--ink4)}

/* ── TOAST ── */
.twrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:var(--r);font-size:13px;font-weight:500;animation:sin .25s ease;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.12);border:0.5px solid transparent;letter-spacing:.1px}
.ts{background:var(--forest);color:#fff;border-color:var(--pine)}
.te{background:var(--ruby);color:#fff}
.ti2{background:var(--slate);color:#fff}
@keyframes sin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:48px 20px;color:var(--ink4)}
.ei{font-size:32px;margin-bottom:10px;opacity:.3}

/* ── PROJ CARD ── */
.proj-card{background:var(--white);border:0.5px solid var(--rule);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;transition:box-shadow .15s;box-shadow:var(--shadow-sm)}
.proj-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.proj-card-head{padding:10px 16px;border-bottom:0.5px solid var(--rule2);display:flex;align-items:center;gap:10px;background:var(--paper)}
.proj-client-badge{display:inline-flex;align-items:center;gap:5px;background:var(--forest);color:rgba(255,255,255,.85);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:.3px}
.proj-card-body{padding:14px 16px}
.proj-card-foot{padding:10px 16px;border-top:0.5px solid var(--rule2);background:var(--paper);display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* ── CLIENT CARD ── */
.client-card{background:var(--white);border:0.5px solid var(--rule);border-radius:var(--rl);padding:16px 20px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow-sm)}
.client-card:hover{border-color:var(--sage);box-shadow:0 4px 16px rgba(0,0,0,.07);background:var(--fog)}
.client-avatar{width:42px;height:42px;border-radius:8px;background:var(--forest);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;color:#fff;flex-shrink:0;letter-spacing:.5px}

/* ── PAGER ── */
.pager{display:flex;align-items:center;gap:5px;justify-content:center;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--rule2)}
.pg{padding:3px 9px;border-radius:var(--r);border:0.5px solid var(--rule);background:var(--white);color:var(--ink3);font-size:12px;cursor:pointer;font-family:inherit}
.pg:hover{background:var(--fog);border-color:var(--sage)}
.pg.on{background:var(--forest);color:#fff;border-color:var(--forest)}
.pg:disabled{opacity:.3;cursor:default}
.proj-row{padding:10px 12px;border-radius:var(--r);border:0.5px solid var(--rule2);margin-bottom:7px;background:var(--white);cursor:pointer;transition:all .15s}
.proj-row:hover{border-color:var(--sage);background:var(--fog)}

/* ── INVOICE PANEL ── */
.inv-box{background:var(--paper);border:0.5px solid var(--rule);border-radius:var(--rl);padding:16px;margin-bottom:14px}
.inv-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--rule2);font-size:13px}
.inv-row:last-child{border-bottom:none}
.inv-row.total{font-weight:600;color:var(--forest);font-size:14px;border-top:1px solid var(--rule);margin-top:4px;padding-top:10px}
.inv-row.deduct{color:var(--ruby)}
.inv-row.add{color:var(--pine)}
.pct-input{width:64px;padding:4px 7px;border:0.5px solid var(--rule);border-radius:var(--rm);font-size:12px;font-family:inherit;text-align:center;background:var(--white);color:var(--ink)}
.pct-input:focus{outline:none;border-color:var(--pine)}
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;padding:7px 10px;border-radius:var(--r);transition:background .1s}
.chk-row:hover{background:var(--cream)}
.chk-row input{accent-color:var(--pine);width:14px;height:14px;cursor:pointer}
.chk-row label{font-size:13px;color:var(--ink2);cursor:pointer;flex:1}

/* ── QUOTE EDITOR ── */
.quote-editor{border:0.5px solid var(--rule);border-radius:var(--r);min-height:200px;padding:12px;font-size:13px;font-family:inherit;outline:none;line-height:1.6;color:var(--ink)}
.quote-editor:focus{border-color:var(--pine);box-shadow:0 0 0 3px rgba(45,122,90,.08)}
.editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding:8px;background:var(--paper);border:0.5px solid var(--rule);border-radius:var(--r)}
.tb-btn{padding:4px 8px;border:0.5px solid var(--rule);border-radius:var(--rm);background:var(--white);cursor:pointer;font-size:12px;font-family:inherit;color:var(--ink3);transition:all .1s}
.tb-btn:hover{background:var(--fog);border-color:var(--sage)}

/* ── TASK DETAIL ── */
.td-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px}
.td-label{font-weight:600;color:var(--ink3);min-width:80px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;margin-top:2px}

/* ── TPL ZONE ── */
.tpl-zone{border:1.5px dashed var(--rule);border-radius:var(--rl);padding:32px 20px;text-align:center;transition:all .2s;cursor:pointer;background:var(--paper);position:relative}
.tpl-zone:hover,.tpl-zone.drag{border-color:var(--sage);background:var(--fog)}
.tpl-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ── SECTION DIVIDER ── */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:var(--ink)}

/* ── CONTRACT CARD ── */
.contract-bar{background:linear-gradient(135deg,var(--forest),var(--pine));color:#fff;border-radius:var(--rl);padding:16px 20px;margin-bottom:16px}
.contract-bar .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.5);margin-bottom:3px}
.contract-bar .big{font-family:'Playfair Display',serif;font-size:28px;font-weight:500}
.contract-bar .small{font-size:12px;color:rgba(255,255,255,.6)}

@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}}
@media(max-width:640px){
  .sb{width:50px}.logo-name,.logo-tag,.sbfoot,.ni span:not(.nbadge){display:none}
  .ni{justify-content:center}.g2,.g4,.g3{grid-template-columns:1fr}.fr,.fr3{grid-template-columns:1fr}
  .modal,.modal-lg{padding:16px;width:98vw}.content{padding:14px}
}
@media print{
  .sb,.topbar,.notif-bar,.twrap,#loadingScreen,.cfg-banner,#pinLock{display:none!important}
  .main{overflow:visible}.content{padding:0;overflow:visible}body{overflow:visible}
}
</style>
</head>
<body>

<!-- PIN -->
<div id="pinLock">
  <div class="pin-logo">O<span>ceango</span></div>
  <div class="pin-sub">Gestión Documental</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress(1)">1</button>
    <button class="pin-btn" onclick="pinPress(2)">2</button>
    <button class="pin-btn" onclick="pinPress(3)">3</button>
    <button class="pin-btn" onclick="pinPress(4)">4</button>
    <button class="pin-btn" onclick="pinPress(5)">5</button>
    <button class="pin-btn" onclick="pinPress(6)">6</button>
    <button class="pin-btn" onclick="pinPress(7)">7</button>
    <button class="pin-btn" onclick="pinPress(8)">8</button>
    <button class="pin-btn" onclick="pinPress(9)">9</button>
    <button class="pin-btn del" onclick="pinClear()">CLR</button>
    <button class="pin-btn" onclick="pinPress(0)">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>

async function dbInsert(table,row){
  const r={...row,id:uid(),created_at:new Date().toISOString()};
  if(sb&&table!=='invoices'){
    const{data,error}=await sb.from(table).insert(r).select().single();
    if(error){toast('Error: '+error.message,'te');console.error(error);return null;}
    DB[table]=[...(DB[table]||[]),data];return data;
  }
  DB[table]=[...(DB[table]||[]),r];
  if(table==='invoices')saveInvoicesLocal();
  return r;
}
async function dbUpdate(table,id,changes){
  const upd=TABLES_WITH_UPDATED.includes(table)?{...changes,updated_at:new Date().toISOString()}:{...changes};
  if(sb&&table!=='invoices'){
    const{error}=await sb.from(table).update(upd).eq('id',id);
    if(error){toast('Error: '+error.message,'te');console.error(error);return false;}
  }
  DB[table]=DB[table].map(r=>r.id===id?{...r,...upd}:r);
  if(table==='invoices')saveInvoicesLocal();
  return true;
}
async function dbDelete(table,id){
  if(sb&&table!=='invoices'){
    const{error}=await sb.from(table).delete().eq('id',id);
    if(error){toast('Error: '+error.message,'te');return false;}
  }
  DB[table]=DB[table].filter(r=>r.id!==id);
  if(table==='invoices')saveInvoicesLocal();
  return true;
}

async function processPDFTemplate(file){
  toast('Procesando PDF…','ti2');
  try{
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;const pages=[];
    for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const sc=2.0;const vp=page.getViewport({scale:sc});const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;pages.push(canvas.toDataURL('image/jpeg',0.9));}
    saveTemplate(pages);
  }catch(e){console.error(e);toast('Error al procesar PDF','te');}
}

function calcInvoice(base,ivaPct,retRentaPct,retIvaPct){
  const subtotal=round2(base);
  const ivaAmt=round2(subtotal*ivaPct/100);
  const totalConIva=round2(subtotal+ivaAmt);
  const retRenta=round2(subtotal*retRentaPct/100);
  const retIva=round2(ivaAmt*retIvaPct/100);
  const neto=round2(totalConIva-retRenta-retIva);
  return{subtotal,ivaAmt,totalConIva,retRenta,retIva,neto};
}

// ═══ CALENDAR ═══
function renderCalendar(){
  const yr=S.calYear,mo=S.calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const td=today();
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cells='';
  for(let i=0;i<firstDay;i++){const pd=new Date(yr,mo,0).getDate();cells+=`<div class="cal-day other-month"><div class="cal-dn">${pd-firstDay+i+1}</div></div>`;}
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===td;const evts=DB.tasks.filter(t=>t.due_date===ds);
    cells+=`<div class="cal-day${isT?' today':''}">
      <div class="cal-dn">${isT?`<span style="width:20px;height:20px;border-radius:50%;background:var(--pine);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500">${d}</span>`:d}</div>
      ${evts.map(e=>`<div class="cal-ev${e.done?' done-ev':e.due_date<td?' urgent':''}" onclick="event.stopPropagation();showTaskDetail('${e.id}')" title="${e.title}">${e.due_time?e.due_time.slice(0,5)+' ':''}${e.title}</div>`).join('')}
    </div>`;
  }
  const rem=(7-(firstDay+dim)%7)%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-day other-month"><div class="cal-dn">${i}</div></div>`;
  return`<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div class="cal-title">${MONTHS[mo]} ${yr}</div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${days.map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}
    </div>
  </div>`;
}
function calNav(dir){S.calMonth+=dir;if(S.calMonth>11){S.calMonth=0;S.calYear++;}if(S.calMonth<0){S.calMonth=11;S.calYear--;}render();}

// ═══ FINANCE ═══
function renderFinance(){

  const teAll=DB.orders.filter(o=>o.type==='expense').reduce((s,o)=>s+Number(o.amount),0);

  const teP=DB.orders.filter(o=>o.type==='expense'&&o.status==='paid').reduce((s,o)=>s+Number(o.amount),0);
  const bal=tiP-teP;
  let ords=[...DB.orders];
  if(ff!=='all')ords=ords.filter(o=>o.type===ff);

    <div class="stat-card"><div class="stat-lbl">Total gastos</div><div class="stat-val" style="color:var(--rose)">${fmtM(teAll)}</div><div class="stat-sub">${fmtM(teP)} pagado</div></div>
    <div class="stat-card"><div class="stat-lbl">Balance cobrado−pagado</div><div class="stat-val" style="color:${bal>=0?'var(--ink)':'var(--rose)'}">${fmtM(bal)}</div></div>

      <div style="width:1px;background:var(--rule2);margin:0 4px"></div>

          const tags=[];
          if(o.has_iva)tags.push(`<span class="tag tb" style="font-size:10px">IVA ${o.iva_pct||15}%</span>`);

      <div class="fg" style="margin-bottom:0">
        <label class="fl">Subtotal / Base (sin IVA)</label>
        <input class="fi" type="number" id="calc_base" placeholder="0.00" oninput="liveCalc()" step="0.01">

        <label class="fl">Ret. Renta %</label>
        <input class="fi pct-input" type="number" id="calc_ret" value="1" min="0" max="100" step="0.01" oninput="liveCalc()" style="width:100%">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label class="fl">Ret. IVA %</label>
        <input class="fi pct-input" type="number" id="calc_retiva" value="30" min="0" max="100" step="0.01" oninput="liveCalc()" style="width:100%">
        <div style="font-size:10px;color:var(--ink4);margin-top:3px">30% bienes · 70% servicios · 100% honorarios</div>

        <div id="calc_lines" style="padding:14px 16px"></div>

    <thead><tr><th>N° Factura</th><th>Fecha</th><th>Proyecto / Cliente</th><th>Subtotal</th><th>IVA</th><th>Total c/IVA</th><th>Ret. Renta</th><th>Ret. IVA</th><th>Neto a recibir</th><th>Estado</th><th>Acc.</th></tr></thead>

        <td><span style="font-family:'Playfair Display',serif;font-size:15px;font-weight:500;color:${inv.neto>=0?'var(--forest)':'var(--rose)'}">${fmtM(inv.neto)}</span></td>
        <td><span class="tag ${inv.cobrada?'tg':'ty'}" style="cursor:pointer" onclick="toggleInvoicePaid('${inv.id}',${!inv.cobrada})">${inv.cobrada?'Cobrada':'Pendiente'}</span></td>
        <td><div style="display:flex;gap:3px">
          <button class="btn bo bxs" onclick="openInvoiceModal('${inv.id}')">${ic('edit',11)}</button>
          <button class="btn bd bxs" onclick="deleteInvoice('${inv.id}')">${ic('trash',11)}</button>
        </div></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div></div>`}`;

function liveCalc(){
  const base=parseFloat($('calc_base')?.value||0);
  const iva=parseFloat($('calc_iva')?.value||0);
  const ret=parseFloat($('calc_ret')?.value||0);
  const retiva=parseFloat($('calc_retiva')?.value||0);
  const res=$('calc_result');if(!res)return;
  if(!base||base<=0){res.style.display='none';return;}
  const c=calcInvoice(base,iva,ret,retiva);
  const ln=$('calc_lines');
  res.style.display='block';
  ln.innerHTML=`
    <div class="inv-row"><span>Subtotal (base imponible)</span><span style="font-weight:500">${fmtM(c.subtotal)}</span></div>
    <div class="inv-row add"><span>+ IVA ${iva}%</span><span>+ ${fmtM(c.ivaAmt)}</span></div>
    <div class="inv-row" style="font-weight:600;border-top:0.5px solid var(--rule);padding-top:6px;margin-top:2px"><span>Total factura (con IVA)</span><span style="color:var(--pine)">${fmtM(c.totalConIva)}</span></div>
    <div class="inv-row deduct" style="margin-top:8px"><span>− Retención de renta ${ret}% (sobre subtotal)</span><span>− ${fmtM(c.retRenta)}</span></div>
    <div class="inv-row deduct"><span>− Retención de IVA ${retiva}% (sobre IVA)</span><span>− ${fmtM(c.retIva)}</span></div>
    <div class="inv-row total"><span>NETO A RECIBIR</span><span style="font-family:'Playfair Display',serif;font-size:17px;color:var(--forest)">${fmtM(c.neto)}</span></div>
  `;
}

function calcInvModal(){
  const base=parseFloat($('inv_sub')?.value||0);
  const iva=parseFloat($('inv_iva_pct')?.value||0);
  const ret=parseFloat($('inv_ret_pct')?.value||0);
  const retiva=parseFloat($('inv_retiva_pct')?.value||0);
  const el=$('inv_summary');if(!el)return;
  if(!base||base<=0){el.innerHTML='<div style="text-align:center;padding:14px;color:var(--ink4);font-size:12px">Ingresa el subtotal para ver el desglose</div>';
    if($('inv_total'))$('inv_total').value='';return;}
  const c=calcInvoice(base,iva,ret,retiva);
  if($('inv_total'))$('inv_total').value=c.totalConIva.toFixed(2);
  el.innerHTML=invSummaryHTML(c,iva,ret,retiva);
}

function calcFromTotal(){
  const total=parseFloat($('inv_total')?.value||0);
  const iva=parseFloat($('inv_iva_pct')?.value||0);
  if(!total||total<=0||iva<0){return;}
  const base=round2(total/(1+iva/100));
  if($('inv_sub'))$('inv_sub').value=base.toFixed(2);
  calcInvModal();
}

function autoFillClient(){
  const pid=$('inv_proj')?.value;
  if(!pid)return;
  const p=DB.projects.find(x=>x.id===pid);
  if(p?.client_id&&$('inv_cl'))$('inv_cl').value=p.client_id;
}

async function saveInvoice(iid=''){
  const num=$('inv_num')?.value?.trim();
  const sub=parseFloat($('inv_sub')?.value||0);
  if(!num){toast('Ingresa el número de factura','te');return;}
  if(!sub||sub<=0){toast('Ingresa el subtotal','te');return;}
  const ivaPct=parseFloat($('inv_iva_pct')?.value||0);
  const retPct=parseFloat($('inv_ret_pct')?.value||0);
  const retIvaPct=parseFloat($('inv_retiva_pct')?.value||0);
  const c=calcInvoice(sub,ivaPct,retPct,retIvaPct);
  const d={
    number:num,date:$('inv_dt')?.value||today(),
    project_id:$('inv_proj')?.value||null,client_id:$('inv_cl')?.value||null,
    concept:$('inv_concept')?.value||null,
    subtotal:c.subtotal,iva_pct:ivaPct,iva_amt:c.ivaAmt,
    total_con_iva:c.totalConIva,
    ret_renta_pct:retPct,ret_renta:c.retRenta,
    ret_iva_pct:retIvaPct,ret_iva:c.retIva,
    neto:c.neto,
    cobrada:$('inv_status')?.value==='1',
    notes:$('inv_notes')?.value||null
  };
  if(iid){await dbUpdate('invoices',iid,d);toast('Factura actualizada');}
  else{const code=await nextCode('FAC');await dbInsert('invoices',{...d,code});toast('Factura registrada');}
  document.getElementById('inv_wrap')?.remove();render();
}

async function toggleInvoicePaid(id,cobrada){await dbUpdate('invoices',id,{cobrada,cobrada_at:cobrada?new Date().toISOString():null});render();}
async function deleteInvoice(id){if(!confirm('¿Eliminar factura?'))return;await dbDelete('invoices',id);toast('Factura eliminada');render();}

function togInv(){const t=$('or_tp')?.value;const g=$('or_inv_g');if(g)g.style.display=t==='income'?'block':'none';}
function calcTax(){
  const a=parseFloat($('or_am')?.value||0);if(!a)return;
  const ivaPct=parseFloat($('or_iva_pct')?.value||15);
  const hasIva=$('or_iva')?.checked;const hasRet=$('or_ret')?.checked;const hasIvaRet=$('or_ivaret')?.checked;
  const rp=parseFloat($('or_rp')?.value||0);const ivaRetPct=parseFloat($('or_ivaret_pct')?.value||30);
  const ivaAmt=hasIva?a*ivaPct/100:0;const retAmt=hasRet&&rp?a*rp/100:0;
  const ivaRetAmt=hasIvaRet?(hasIva?ivaAmt:a*ivaPct/100)*ivaRetPct/100:0;
  const is=$('iva_show');if(is){is.style.display=hasIva?'inline':'none';is.textContent=fmtM(ivaAmt);}
  const rs=$('ret_show');if(rs){rs.style.display=hasRet?'inline':'none';rs.textContent='-'+fmtM(retAmt);}
  const ir=$('ivaret_show');if(ir){ir.style.display=hasIvaRet?'inline':'none';ir.textContent='-'+fmtM(ivaRetAmt);}
  const sum=$('tax_summary');const lin=$('tax_lines');const tot=$('tax_total');
  if(!sum)return;
  if(!hasIva&&!hasRet&&!hasIvaRet){sum.style.display='none';return;}
  let html=`Base: ${fmtM(a)}`;
  if(hasIva)html+=` + IVA ${ivaPct}%: +${fmtM(ivaAmt)}`;
  if(hasRet&&rp)html+=` − Ret.Renta ${rp}%: -${fmtM(retAmt)}`;
  if(hasIvaRet)html+=` − Ret.IVA ${ivaRetPct}%: -${fmtM(ivaRetAmt)}`;
  const net=a+ivaAmt-retAmt-ivaRetAmt;
  if(lin)lin.innerHTML=html;
  if(tot)tot.textContent=`Neto: ${fmtM(net)}`;
  sum.style.display='block';
}

async function saveProject(pid){

  const rows=document.querySelectorAll('#prows>div');const sched=[];let tot=0;

  </style></head><body><div class="page">

    <div style="text-align:right;font-size:11px;color:#6b737a;line-height:1.8">oceango.ec@gmail.com<br>+593 969245676<br>Guayaquil, Ecuador</div>

      const ps=DB.payment_schedule.filter(x=>x.project_id===p.id);const cob=DB.orders.filter(o=>o.project_id===p.id&&o.type==='income'&&o.status==='paid').reduce((s,o)=>s+Number(o.amount),0);
      return`<div class="proj-card"><div class="proj-name">${p.name}</div><div style="font-size:10px;font-family:monospace;color:#6b737a;margin-bottom:5px">${p.code}</div>

        <div class="row"><span>Período</span><span>${fmtD(p.start_date)} → ${fmtD(p.end_date)}</span></div>
        <div class="row"><span>Valor Contrato</span><strong>${fmtM(p.contract_value)}</strong></div>
        <div class="row"><span>Total Cobrado</span><strong style="color:#2d7a5a">${fmtM(cob)}</strong></div>

  <div class="section"><h2>Pagos recibidos</h2>
    <table><thead><tr><th>Código</th><th>Fecha</th><th>Concepto</th><th>Factura</th><th>Monto</th><th>Estado</th></tr></thead>
    <tbody>${cobros.map(o=>`<tr><td style="font-family:monospace;font-size:10px">${o.code}</td><td>${fmtD(o.order_date)}</td><td>${o.concept}</td><td style="font-family:monospace;font-size:10px">${o.invoice_num||'—'}</td><td><strong>${fmtM(o.amount)}</strong></td><td style="color:${o.status==='paid'?'#2d7a5a':'#b07c2a'};font-weight:500">${o.status==='paid'?'Pagado':'Pendiente'}</td></tr>`).join('')}
      <tr class="totrow"><td colspan="4">TOTAL COBRADO</td><td colspan="2">${fmtM(total)}</td></tr>

}

function setPF(v){S.projFilter=v;render();}
function setTF(v){S.taskFilter=v;render();}
function setFF(v){S.finFilter=v;render();}

function requestNotifPermission(){
  if('Notification'in window&&Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted'){toast('Notificaciones activadas');scheduleNotifs();}});
  }
}
function scheduleNotifs(){
  DB.tasks.filter(t=>!t.done&&t.due_date).forEach(t=>{
    const diff=Math.round((new Date(t.due_date+'T12:00:00')-new Date())/86400000);
    if((diff===0||diff===1)&&Notification.permission==='granted')new Notification('Oceango',{body:diff===0?`HOY: ${t.title}`:`MAÑANA: ${t.title}`});
  });
}

// ═══ BOOT ═══
async function startApp(){
  $('loadingScreen').style.display='flex';
  if(KEYS_OK){
    $('loadMsg').textContent='Conectando con Supabase…';
    const ok=await loadFromSupabase();
    if(!ok){$('loadMsg').textContent='Sin conexión — modo local';}
    else{$('loadMsg').textContent='Cargando plantilla…';await loadTemplate();}
  } else {
    try{DB.invoices=JSON.parse(localStorage.getItem('oceango_invoices')||'[]');}catch{}
  }
  $('loadMsg').textContent='¡Listo!';
  const ls=$('loadingScreen');ls.classList.add('fade');setTimeout(()=>ls.remove(),400);
  render();
  if('Notification'in window&&Notification.permission==='granted')scheduleNotifs();
}
</script>
