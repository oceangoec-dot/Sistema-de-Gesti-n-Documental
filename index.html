<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.85em' font-size='55' font-weight='bold' font-family='Arial' fill='%231B4332'>OC</text></svg>">
<title>Oceango</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* CORE PALETTE — colorful, card-forward, Trello/Asana energy */
  --bg:#F4F5FB;--surface:#FFFFFF;--surface2:#F0F1FA;--surface3:#E8E9F7;
  --border:#E3E4F1;--border2:#CBCDE6;
  --txt:#1B1B33;--txt2:#4A4B66;--txt3:#8587A8;

  --violet:#5B5FEF;--violet-dim:#5B5FEF16;--violet-pale:#ECEDFF;
  --violet2:#4347D9;
  --mint:#00C896;--mint-dim:#00C89616;--mint-pale:#DEFBF2;
  --coral:#FF6B6B;--coral-dim:#FF6B6B16;--coral-pale:#FFE9E9;
  --amber:#FFB020;--amber-dim:#FFB02018;--amber-pale:#FFF4DE;
  --sky:#3AB0FF;--sky-dim:#3AB0FF16;
  --pink:#F45BB5;--pink-dim:#F45BB516;

  --r:10px;--rl:16px;--rx:22px;--rxx:28px;
  --sh:0 1px 2px rgba(27,27,51,.06),0 1px 1px rgba(27,27,51,.04);
  --sh2:0 6px 20px rgba(27,27,51,.08),0 2px 6px rgba(27,27,51,.05);
  --sh3:0 20px 50px rgba(27,27,51,.16),0 6px 16px rgba(27,27,51,.08);
  --shc:0 10px 28px -6px var(--card-glow,rgba(91,95,239,.35));
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow:hidden;font-size:13.5px;-webkit-font-smoothing:antialiased;line-height:1.5}
.disp{font-family:'Outfit',sans-serif}

/* CLIENT COLOR ROTATION — 8 vivid identities */
.cc0{--cc:#5B5FEF;--ccL:#ECEDFF}
.cc1{--cc:#00C896;--ccL:#DEFBF2}
.cc2{--cc:#FF6B6B;--ccL:#FFE9E9}
.cc3{--cc:#FFB020;--ccL:#FFF4DE}
.cc4{--cc:#3AB0FF;--ccL:#E5F4FF}
.cc5{--cc:#F45BB5;--ccL:#FEEAF6}
.cc6{--cc:#8B5CF6;--ccL:#F1ECFE}
.cc7{--cc:#1FA978;--ccL:#DFF6EC}

/* PIN */
#pinLock{position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,#3B3FCB 0%,#1B1B4D 55%,#10102E 100%);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#pinLock.gone{display:none}
.pin-brand{font-family:'Outfit',sans-serif;font-size:38px;font-weight:800;color:#fff;letter-spacing:-1.5px;margin-bottom:4px}
.pin-brand em{color:#8FE3C7;font-style:normal}
.pin-tagline{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:52px}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);transition:all .2s}
.pin-dot.filled{background:#8FE3C7;border-color:#8FE3C7;box-shadow:0 0 14px rgba(143,227,199,.6)}
.pin-dot.error{background:#FF6B6B;border-color:#FF6B6B}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-btn{height:72px;border-radius:var(--rl);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#fff;font-size:22px;font-family:'Outfit',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;backdrop-filter:blur(4px)}
.pin-btn:hover{background:rgba(143,227,199,.18);border-color:#8FE3C7}
.pin-btn:active{transform:scale(.93)}
.pin-btn.del{font-size:12px;color:rgba(255,255,255,.5);font-family:'Inter',sans-serif;letter-spacing:1px}
.pin-err{color:#FF9B9B;font-size:11px;margin-top:14px;height:14px;text-align:center}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,#3B3FCB 0%,#1B1B4D 55%,#10102E 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loadingScreen.fade{opacity:0;pointer-events:none}
.load-brand{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-1px}
.load-brand em{color:#8FE3C7;font-style:normal}
.load-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:32px}
.load-bar{width:160px;height:3px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,#8FE3C7,#5B5FEF);animation:lf 1.2s ease forwards}
@keyframes lf{from{width:0}to{width:100%}}
.load-msg{font-size:11px;color:rgba(255,255,255,.45);margin-top:12px}

/* APP */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sb{width:226px;background:#1B1B3D;display:flex;flex-direction:column;flex-shrink:0}
.sb-logo{padding:24px 20px 20px}
.sb-logo-text{font-family:'Outfit',sans-serif;font-size:21px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.sb-logo-text em{color:#8FE3C7;font-style:normal}
.sb-logo-tag{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.32);margin-top:3px}
.sb-nav{padding:10px 12px;flex:1;overflow-y:auto}
.sb-sec{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:14px 10px 6px;font-weight:700}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;font-weight:600;transition:all .15s;margin-bottom:3px;border:none;background:none;width:100%;text-align:left;position:relative}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.92)}
.ni.on{background:linear-gradient(120deg,#5B5FEF,#4347D9);color:#fff;box-shadow:0 4px 14px rgba(91,95,239,.4)}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.85}
.ni.on svg{opacity:1}
.nbadge{background:#FF6B6B;color:#fff;border-radius:20px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:auto;font-family:'JetBrains Mono',monospace}
.sb-divider{height:1px;background:rgba(255,255,255,.08);margin:10px 12px}
.sb-footer{padding:14px 18px;font-size:9px;color:rgba(255,255,255,.28);display:flex;align-items:center;gap:6px}
.sb-status{width:5px;height:5px;border-radius:50%;background:#00C896;box-shadow:0 0 6px #00C896}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 26px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ptitle{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-.3px}
.date-chip{font-size:11px;color:var(--txt3);background:var(--surface2);padding:6px 13px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-weight:500}
.content{flex:1;overflow-y:auto;padding:26px}

/* BTNS */
.btn{padding:9px 17px;border-radius:11px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;line-height:1;letter-spacing:.1px;white-space:nowrap}
.bp{background:linear-gradient(120deg,#5B5FEF,#4347D9);color:#fff;box-shadow:0 3px 10px rgba(91,95,239,.35)}.bp:hover{filter:brightness(1.08)}
.bo{background:var(--surface);border:1.5px solid var(--border2);color:var(--txt2)}.bo:hover{background:var(--surface2);border-color:var(--violet)}
.bg2{background:linear-gradient(120deg,#00C896,#00A87E);color:#fff;box-shadow:0 3px 10px rgba(0,200,150,.35)}.bg2:hover{filter:brightness(1.08)}
.bd{background:var(--coral-dim);color:#E04F4F;border:1.5px solid rgba(255,107,107,.25)}.bd:hover{background:rgba(255,107,107,.2)}
.bam{background:var(--amber-dim);color:#C97E00;border:1.5px solid rgba(255,176,32,.3)}.bam:hover{background:rgba(255,176,32,.22)}
.bsm{padding:7px 13px;font-size:11.5px;border-radius:9px}.bxs{padding:5px 9px;font-size:11px;border-radius:8px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:var(--sh)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* STATS */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accentbar,var(--violet))}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-bottom:8px}
.stat-val{font-family:'Outfit',sans-serif;font-size:27px;font-weight:800;color:var(--txt);line-height:1;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--txt3);margin-top:5px}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.tg{background:var(--mint-dim);color:#00946D}
.ty{background:var(--amber-dim);color:#C97E00}
.tb{background:var(--sky-dim);color:#1A85D6}
.tr{background:var(--coral-dim);color:#E04F4F}
.tgr{background:var(--surface3);color:var(--txt3)}
.tpu{background:#8B5CF616;color:#7C3AED}

/* PROGRESS */
.pb{height:6px;background:var(--surface3);border-radius:6px;overflow:hidden}
.pf{height:100%;background:var(--violet);border-radius:6px;transition:width .4s ease}

/* DONUT RING */
.donut{position:relative;width:54px;height:54px;flex-shrink:0}
.donut svg{transform:rotate(-90deg)}
.donut-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;padding:10px 14px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--txt);vertical-align:middle}
.tbl tr:hover td{background:var(--surface2)}
.tbl tr:last-child td{border-bottom:none}
.tw{overflow-x:auto}
.mono{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500}

/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:10px;font-weight:700;color:var(--txt3);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;padding:10px 13px;border:1.5px solid var(--border2);border-radius:11px;font-size:13px;font-family:'Inter',sans-serif;color:var(--txt);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
.fi:focus{border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-dim)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(20,20,50,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(8px)}
.modal{background:var(--surface);border-radius:var(--rxx);padding:28px;width:580px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:var(--sh3)}
.modal-lg{width:720px}
.modal-xl{width:960px}
.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
.mt{font-family:'Outfit',sans-serif;font-size:19px;font-weight:800;color:var(--txt);letter-spacing:-.3px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.div{height:1px;background:var(--border);margin:18px 0}
.stitle{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--txt3);margin-bottom:12px}

/* SECTION HEAD */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt3);margin-bottom:6px}
.crumb b{color:var(--txt);cursor:pointer}
.crumb b:hover{color:var(--violet)}

/* === CLIENT CARDS === */
.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.cl-card{background:var(--surface);border-radius:var(--rx);padding:22px;cursor:pointer;transition:all .2s;box-shadow:var(--sh);position:relative;overflow:hidden;border:1px solid var(--border)}
.cl-card::after{content:'';position:absolute;top:0;left:0;right:0;height:64px;background:linear-gradient(135deg,var(--cc),var(--cc) 70%,transparent);opacity:.08}
.cl-card:hover{transform:translateY(-3px);box-shadow:var(--shc);border-color:var(--cc)}
.cl-avatar{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--cc),var(--cc));display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:17px;color:#fff;font-weight:800;flex-shrink:0;box-shadow:0 4px 12px -2px var(--cc);position:relative;z-index:1}
.cl-name{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;color:var(--txt);margin-bottom:3px;position:relative;z-index:1}
.cl-meta{font-size:11.5px;color:var(--txt3);line-height:1.6;position:relative;z-index:1}
.cl-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;position:relative;z-index:1}
.cl-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);position:relative;z-index:1}
.cl-stat-lbl{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:3px}
.cl-stat-val{font-family:'Outfit',sans-serif;font-size:17px;font-weight:800}

/* === CLIENT-AS-FOLDER CARD (Projects landing) === */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.folder-card{background:linear-gradient(160deg,var(--ccL),var(--surface) 55%);border:1px solid var(--border);border-radius:var(--rx);padding:22px;cursor:pointer;transition:all .2s;box-shadow:var(--sh);position:relative}
.folder-card:hover{transform:translateY(-3px);box-shadow:var(--shc);border-color:var(--cc)}
.folder-icon{width:46px;height:46px;border-radius:14px;background:var(--cc);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;margin-bottom:14px;box-shadow:0 4px 12px -2px var(--cc)}
.folder-name{font-family:'Outfit',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.folder-sub{font-size:11.5px;color:var(--txt3);margin-bottom:14px}
.folder-stats-row{display:flex;gap:14px;margin-bottom:6px}
.folder-stat{flex:1}
.folder-stat-n{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800}
.folder-stat-l{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.folder-arrow{position:absolute;top:20px;right:20px;color:var(--cc);opacity:.5;transition:all .2s}
.folder-card:hover .folder-arrow{opacity:1;transform:translateX(3px)}

/* === PROJECT CARDS (inside a client folder) === */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rx);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--sh);position:relative}
.pc:hover{border-color:var(--cc);box-shadow:var(--shc);transform:translateY(-3px)}
.pc-accent{height:6px}
.pc-accent.active{background:linear-gradient(90deg,var(--cc),var(--cc))}
.pc-accent.paused{background:#FFB020}
.pc-accent.finished{background:#00C896}
.pc-accent.inactive{background:var(--border2)}
.pc-body{padding:18px}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.pc-name{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;color:var(--txt);margin-bottom:4px}
.pc-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3)}
.pc-value{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--txt);margin:2px 0 10px}
.pc-prog-row{display:flex;justify-content:space-between;font-size:10.5px;color:var(--txt3);margin-bottom:4px}
.pc-footer{padding:11px 18px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center}

/* PROJECT DETAIL TABS — pill style */
.proj-tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.proj-tab{padding:10px 18px;font-size:13px;font-weight:700;color:var(--txt3);cursor:pointer;border-radius:30px;transition:all .15s;background:var(--surface2);border:1.5px solid transparent;font-family:'Inter',sans-serif}
.proj-tab:hover{color:var(--txt);background:var(--surface3)}
.proj-tab.on{color:#fff;background:linear-gradient(120deg,var(--cc),var(--cc));box-shadow:0 4px 12px -2px var(--cc)}

/* FINANCIAL CARD */
.fin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:17px;box-shadow:var(--sh);position:relative;overflow:hidden}
.fin-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--fc,var(--violet))}
.fin-val{font-family:'Outfit',sans-serif;font-size:23px;font-weight:800;line-height:1.1}
.fin-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);font-weight:700;margin-bottom:5px}
.fin-sub{font-size:11px;color:var(--txt3);margin-top:4px}

/* COMPROBANTE UPLOAD */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2);position:relative}
.upload-zone:hover{border-color:var(--violet);background:var(--violet-dim)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-thumb{width:100%;max-height:140px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border)}
.cloud-badge{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;color:#00946D;background:var(--mint-dim);padding:2px 8px;border-radius:10px;font-weight:700}

/* CONCILIATION */
.concil-row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:var(--rl);border:1px solid var(--border);margin-bottom:8px;background:var(--surface);transition:all .15s}
.concil-row:hover{border-color:var(--violet);box-shadow:var(--sh)}
.concil-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* TOAST */
.twrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:13px;font-size:13px;font-weight:700;animation:sin .2s ease;max-width:320px;box-shadow:var(--sh2)}
.ts{background:var(--surface);color:var(--txt);border:1.5px solid var(--border2)}
.te{background:#FFF0F0;color:#E04F4F;border:1.5px solid rgba(255,107,107,.3)}
.ti2{background:#E5F4FF;color:#1A85D6;border:1.5px solid rgba(58,176,255,.3)}
@keyframes sin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* MISC */
.empty{text-align:center;padding:54px 20px;color:var(--txt3)}
.ei{font-size:34px;margin-bottom:10px;opacity:.4}
.pager{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.pg{padding:6px 12px;border-radius:9px;border:1.5px solid var(--border2);background:transparent;color:var(--txt3);font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:600}
.pg:hover{border-color:var(--violet);color:var(--violet)}
.pg.on{background:linear-gradient(120deg,var(--violet),var(--violet2));color:#fff;border-color:transparent}
.pg:disabled{opacity:.3;cursor:default}

  return`<div class="donut" style="width:${size}px;height:${size}px">

}

async function loadFromSupabase(){
  if(!sb)return false;

    const lm=$('loadMsg');if(lm)lm.textContent='Cargando datos…';
    const[c,p,ps,t,o,q,inv,ant]=await Promise.all([

      sb.from('tasks').select('*').order('step_order'),sb.from('orders').select('*').order('order_date',{ascending:false}),
      sb.from('quotes').select('*').order('created_at',{ascending:false}),
      sb.from('invoices').select('*').order('created_at',{ascending:false}),
      sb.from('anticipos').select('*')
    ]);
    DB.clients=c.data||[];DB.projects=p.data||[];DB.payment_schedule=ps.data||[];
    DB.tasks=t.data||[];DB.orders=o.data||[];DB.quotes=q.data||[];
    DB.invoices=inv.data||[];DB.anticipos=ant.data||[];

async function nextCode(prefix){const key=`oceango_seq_${prefix}`;const n=(parseInt(localStorage.getItem(key)||'0'))+1;localStorage.setItem(key,n);return`${prefix}-${String(n).padStart(4,'0')}-${new Date().getFullYear()}`;}

async function dbInsert(table,row){
  const r={...row,id:uid(),created_at:new Date().toISOString()};
  if(sb){const{data,error}=await sb.from(table).insert(r).select().single();if(error){toast('Error: '+error.message,'te');return null;}DB[table]=[...(DB[table]||[]),data];return data;}
  DB[table]=[...(DB[table]||[]),r];return r;
}
async function dbUpdate(table,id,changes){
  const upd=TABLES_WITH_UPDATED.includes(table)?{...changes,updated_at:new Date().toISOString()}:{...changes};
  if(sb){const{error}=await sb.from(table).update(upd).eq('id',id);if(error){toast('Error: '+error.message,'te');return false;}}
  DB[table]=DB[table].map(r=>r.id===id?{...r,...upd}:r);return true;
}
async function dbDelete(table,id){
  if(sb){const{error}=await sb.from(table).delete().eq('id',id);if(error){toast('Error: '+error.message,'te');return false;}}
  DB[table]=DB[table].filter(r=>r.id!==id);return true;
}

async function processPDFTemplate(file){
  toast('Procesando PDF…','ti2');
  try{
    if(!window.pdfjsLib){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}
    const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;const pages=[];
    for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const sc=2.5;const vp=page.getViewport({scale:sc});const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;pages.push(canvas.toDataURL('image/png',0.95));}
    saveTemplate(pages);
  }catch(e){console.error(e);toast('Error al procesar PDF','te');}
}
function handleTplFile(file){if(!file)return;if(file.type!=='application/pdf'){toast('Solo PDF','te');return;}processPDFTemplate(file);}

  const subtotal=round2(base);const ivaAmt=round2(subtotal*ivaPct/100);const totalConIva=round2(subtotal+ivaAmt);
  const retRenta=round2(subtotal*retRentaPct/100);const retIva=round2(ivaAmt*retIvaPct/100);const neto=round2(totalConIva-retRenta-retIva);
  return{subtotal,ivaAmt,totalConIva,retRenta,retIva,neto};
}

// ===== CALENDAR =====
function renderCalendar(){
  const yr=S.calYear,mo=S.calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const td=today();
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cells='';
  for(let i=0;i<firstDay;i++){const pd=new Date(yr,mo,0).getDate();cells+=`<div class="cal-day other-month"><div class="cal-dn">${pd-firstDay+i+1}</div></div>`;}
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===td;const evts=DB.tasks.filter(t=>t.due_date===ds);
    cells+=`<div class="cal-day${isT?' today':''}">
      <div class="cal-dn">${isT?`<span style="width:22px;height:22px;border-radius:50%;background:var(--violet);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">${d}</span>`:d}</div>
      ${evts.map(e=>`<div class="cal-ev${e.done?' done-ev':e.due_date<td?' urgent':''}" title="${e.title}">${e.title}</div>`).join('')}
    </div>`;
  }
  const rem=(7-(firstDay+dim)%7)%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-day other-month"><div class="cal-dn">${i}</div></div>`;
  return`<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div class="cal-title">${MONTHS[mo]} ${yr}</div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">${days.map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}</div>
  </div>`;
}
function calNav(dir){S.calMonth+=dir;if(S.calMonth>11){S.calMonth=0;S.calYear++;}if(S.calMonth<0){S.calMonth=11;S.calYear--;}render();}

          <div class="folder-stat"><div class="folder-stat-n" style="color:var(--cc)">${active}</div><div class="folder-stat-l">Activos</div></div>
          <div class="folder-stat"><div class="folder-stat-n">${fmtM(totalVal)}</div><div class="folder-stat-l">Valor total</div></div>
        </div>
      </div>`;
    }).join('')}
    ${orphans.length>0?`<div class="folder-card" onclick="S.projectsFolder='__orphans__';render()" style="--cc:var(--txt3);--ccL:var(--surface3)">
        <div class="folder-arrow">${ic('arrow',18)}</div>
        <div class="folder-icon" style="background:var(--txt3)">${ic('folder',18)}</div>
        <div class="folder-name">Sin cliente</div>
        <div class="folder-sub">${orphans.length} proyecto${orphans.length!==1?'s':''}</div>

}

function renderProjectFolderContents(folderId){
  const isOrphan=folderId==='__orphans__';
  const cl=isOrphan?null:DB.clients.find(c=>c.id===folderId);
  if(!isOrphan&&!cl){S.projectsFolder=null;return renderProjectFolders();}
  const idx=isOrphan?-1:DB.clients.indexOf(cl);
  const cc=isOrphan?'':ccClass(idx);
  const projs=isOrphan?DB.projects.filter(p=>!DB.clients.find(c=>c.id===p.client_id)):DB.projects.filter(p=>p.client_id===folderId);
  const sl={active:'Activo',paused:'En Pausa',finished:'Finalizado',inactive:'Inactivo'};
  const sc={active:'tg',paused:'ty',finished:'tb',inactive:'tgr'};

  return`
  <div class="crumb"><b onclick="S.projectsFolder=null;render()">Proyectos</b> ${ic('arrow',12)} <span style="color:var(--txt)">${isOrphan?'Sin cliente':cl.name}</span></div>
  <div class="filter-bar" style="margin-top:10px">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="folder-icon ${cc}" style="margin-bottom:0;width:38px;height:38px;font-size:13px">${isOrphan?ic('folder',16):initials(cl.name)}</div>
      <div>
        <div class="section-title" style="margin-bottom:2px">${isOrphan?'Sin cliente':cl.name}</div>
        <div style="font-size:11.5px;color:var(--txt3)">${projs.length} proyecto${projs.length!==1?'s':''} · ${projs.filter(p=>p.status==='active').length} activos</div>
      </div>
    </div>
    <button class="btn bp" onclick="openProjectModal(null${isOrphan?'':`,'${folderId}'`})">+ Proyecto</button>
  </div>
  ${projs.length===0?`<div class="card"><div class="empty"><div class="ei">📁</div>Sin proyectos en esta carpeta</div></div>`:
  `<div class="proj-grid">
    ${projs.map(p=>{
      const pt=DB.tasks.filter(t=>t.project_id===p.id);
      const pcPct=pt.length?Math.round(pt.filter(t=>t.done).length/pt.length*100):0;
      const psch=DB.payment_schedule.filter(x=>x.project_id===p.id);
      const facturado=DB.invoices.filter(i=>i.project_id===p.id).reduce((s,i)=>s+Number(i.subtotal||0),0);
      const contrato=Number(p.contract_value||0);
      const pctF=contrato>0?Math.min(100,Math.round(facturado/contrato*100)):0;
      const cobrado=DB.orders.filter(o=>o.project_id===p.id&&o.type==='income').reduce((s,o)=>{
        return s+(DB.anticipos||[]).filter(a=>a.order_id===o.id&&a.pagado).reduce((sa,a)=>sa+Number(a.monto),0);
      },0);
      const statusClass={active:'active',paused:'paused',finished:'finished',inactive:'inactive'}[p.status]||'inactive';
      return`<div class="pc ${cc}" onclick="S.projDetailId='${p.id}';render()">
        <div class="pc-accent ${statusClass}"></div>
        <div class="pc-body">
          <div class="pc-top">
            <div>
              <div class="pc-name">${p.name}</div>
              <div class="pc-code">${p.code}</div>
            </div>
            ${donut(pcPct,'var(--cc)',44,pcPct+'%')}
          </div>
          <span class="tag ${sc[p.status]||'tgr'}">${sl[p.status]}</span>
          <div class="pc-value">${fmtM(contrato)}</div>
          <div style="font-size:11px;color:var(--txt3);margin-bottom:8px">Cobrado: <strong style="color:#00946D">${fmtM(cobrado)}</strong></div>
          <div class="pc-prog-row"><span>Facturado</span><span>${pctF}%</span></div>
          <div class="pb" style="margin-bottom:9px"><div class="pf" style="width:${pctF}%;background:var(--mint)"></div></div>
          ${psch.length>0?`<div style="display:flex;gap:4px;flex-wrap:wrap">${psch.map(x=>`<span class="pay-chip ${x.paid?'paid':''}" style="font-size:9.5px" onclick="event.stopPropagation();togglePS('${x.id}',${!x.paid})"><span class="pay-dot"></span>${x.label}${x.paid?' ✓':''}</span>`).join('')}</div>`:''}
        </div>
        <div class="pc-footer">
          <span style="font-size:10.5px;color:var(--txt3)">${fmtDS(p.start_date)} → ${fmtDS(p.end_date)||'…'}</span>
          <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
            <button class="btn bo bxs" onclick="openProjectModal('${p.id}')">${ic('edit',11)}</button>
            <button class="btn bd bxs" onclick="deleteProject('${p.id}')">${ic('trash',11)}</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`}`;
}

// ===== PROJECT DETAIL (4 TABS) =====
function renderProjectDetail(pid){
  const p=DB.projects.find(x=>x.id===pid);if(!p)return'';
  const cl=DB.clients.find(c=>c.id===p.client_id);
  const idx=DB.clients.indexOf(cl);
  const cc=idx>=0?ccClass(idx):'';
  const sl={active:'Activo',paused:'En Pausa',finished:'Finalizado',inactive:'Inactivo'};
  const sc={active:'tg',paused:'ty',finished:'tb',inactive:'tgr'};

  // Compute financials
  const contrato=Number(p.contract_value||0);
  const facturas=DB.invoices.filter(i=>i.project_id===pid);
  const totalFacturado=facturas.reduce((s,i)=>s+Number(i.subtotal||0),0);
  const totalNetoBanco=facturas.reduce((s,i)=>s+Number(i.neto||0),0);
  const ordIncome=DB.orders.filter(o=>o.project_id===pid&&o.type==='income');
  const ordExpense=DB.orders.filter(o=>o.project_id===pid&&o.type==='expense');
  const totalCobrado=ordIncome.reduce((s,o)=>{
    return s+(DB.anticipos||[]).filter(a=>a.order_id===o.id&&a.pagado).reduce((sa,a)=>sa+Number(a.monto),0);
  },0);
  const totalGastado=ordExpense.filter(o=>o.status==='paid').reduce((s,o)=>s+Number(o.amount),0);
  const totalEgresos=ordExpense.reduce((s,o)=>s+Number(o.amount),0);
  const utilidad=totalCobrado-totalGastado;
  const saldoContrato=round2(contrato-totalFacturado);
  const pctFac=contrato>0?Math.min(100,Math.round(totalFacturado/contrato*100)):0;
  const pctCob=totalNetoBanco>0?Math.min(100,Math.round(totalCobrado/totalNetoBanco*100)):0;

  const tab=S.projDetailTab||'financiero';
  const pt=DB.tasks.filter(t=>t.project_id===pid).sort((a,b)=>(a.step_order||0)-(b.step_order||0));
  const ps=DB.payment_schedule.filter(x=>x.project_id===pid);

  function tabContent(){
    if(tab==='financiero'){
      return`
      <!-- SUMMARY GRID -->
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px">
        ${[
          ['Contrato',fmtM(contrato),'var(--txt)','var(--violet)'],
          ['Facturado',fmtM(totalFacturado),'#1A85D6','var(--sky)',`${pctFac}% del contrato`],
          ['Neto banco',fmtM(totalNetoBanco),'var(--violet)','var(--violet)','después de ret.'],
          ['Cobrado',fmtM(totalCobrado),'#00946D','var(--mint)','llegó al banco'],
          ['Utilidad',fmtM(utilidad),utilidad>=0?'var(--txt)':'#E04F4F',utilidad>=0?'var(--violet)':'var(--coral)','cobrado − gastos']
        ].map(([l,v,col,fc,sub])=>`<div class="fin-card" style="--fc:${fc}">
          <div class="fin-lbl">${l}</div>
          <div class="fin-val" style="color:${col}">${v}</div>
          ${sub?`<div class="fin-sub">${sub}</div>`:''}
        </div>`).join('')}
      </div>
      <!-- PROGRESS BARS -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;margin-bottom:20px;box-shadow:var(--sh)">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-bottom:5px"><span>Facturado del contrato ${pctFac}%</span><span style="color:${saldoContrato>0?'#C97E00':'#00946D'}">Saldo por facturar: ${fmtM(saldoContrato)}</span></div>
        <div class="pb" style="height:8px;margin-bottom:14px"><div class="pf" style="width:${pctFac}%;background:var(--sky)"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--txt3);margin-bottom:5px"><span>Cobrado sobre neto ${pctCob}%</span><span>${fmtM(totalCobrado)} de ${fmtM(totalNetoBanco)}</span></div>
        <div class="pb" style="height:8px"><div class="pf" style="width:${pctCob}%;background:var(--mint)"></div></div>
      </div>
      <!-- FACTURAS -->
      <div class="section-head">
        <div class="section-title">Facturas emitidas</div>
        <button class="btn bp bsm" onclick="openInvoiceModal(null,'${pid}')">+ Nueva Factura</button>
      </div>
      ${facturas.length===0?`<div style="border:2px dashed var(--border2);border-radius:var(--rl);padding:24px;text-align:center;color:var(--txt3);margin-bottom:16px">Sin facturas — registra la primera</div>`:
      `<div class="tw" style="margin-bottom:20px"><table class="tbl">
        <thead><tr><th>N° Factura</th><th>Fecha</th><th>Subtotal</th><th>IVA</th><th>Neto banco</th><th>Cobrada</th><th>Anticipos</th><th></th></tr></thead>
        <tbody>${facturas.map(inv=>{
          const ord=DB.orders.find(o=>o.invoice_id===inv.id||o.invoice_num===inv.number);
          const antPag=ord?(DB.anticipos||[]).filter(a=>a.order_id===ord.id&&a.pagado).reduce((s,a)=>s+Number(a.monto),0):0;
          const pctA=inv.neto>0?Math.min(100,Math.round(antPag/inv.neto*100)):0;
          return`<tr>
            <td><span class="mono" style="color:var(--violet)">${inv.number}</span></td>
            <td style="font-size:11.5px">${fmtD(inv.date)}</td>
            <td style="font-weight:600">${fmtM(inv.subtotal)}</td>
            <td style="color:#1A85D6">${fmtM(inv.iva_amt)}</td>
            <td><span style="font-family:'Outfit',sans-serif;font-weight:800;color:var(--violet)">${fmtM(inv.neto)}</span></td>
            <td><span class="tag ${inv.cobrada?'tg':'ty'}" style="cursor:pointer" onclick="toggleInvoicePaid('${inv.id}',${!inv.cobrada})">${inv.cobrada?'Cobrada':'Pendiente'}</span></td>
            <td>
              <div style="min-width:90px">
                <div style="height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-bottom:3px"><div style="height:100%;background:${pctA>=100?'var(--mint)':'var(--violet)'};width:${pctA}%"></div></div>
                <div style="font-size:9.5px;color:var(--txt3)">${fmtM(antPag)} (${pctA}%)</div>
                ${ord?`<button class="btn bo bxs" style="margin-top:3px;font-size:9.5px" onclick="openAnticiposModal('${ord.id}')">Anticipos</button>`:''}
              </div>
            </td>
            <td>
              <div style="display:flex;gap:3px">
                ${inv.foto_url?`<button class="btn bo bxs" onclick="verImg('${inv.id}','inv')">${ic('photo',10)}</button>`:''}
                <button class="btn bo bxs" onclick="openInvoiceModal('${inv.id}','${pid}')">${ic('edit',10)}</button>
                <button class="btn bd bxs" onclick="deleteInvoice('${inv.id}')">${ic('trash',10)}</button>
              </div>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`}
      <!-- COMPROBANTES/EGRESOS -->
      <div class="section-head">
        <div class="section-title">Egresos / Costos</div>
        <button class="btn bam bsm" onclick="openOrderModal(null,'${pid}','expense')">+ Egreso</button>
      </div>
      ${ordExpense.length===0?`<div style="border:2px dashed var(--border2);border-radius:var(--rl);padding:20px;text-align:center;color:var(--txt3)">Sin costos registrados</div>`:
      `<div class="tw"><table class="tbl">
        <thead><tr><th>Fecha</th><th>Concepto</th><th>Categoría</th><th>Monto</th><th>Estado</th><th>Comprobante</th><th></th></tr></thead>
        <tbody>${ordExpense.map(o=>`<tr>
          <td style="font-size:11.5px">${fmtD(o.order_date)}</td>
          <td style="font-weight:600">${o.concept}</td>
          <td><span class="tag tgr" style="font-size:10px">${o.expense_category||'—'}</span></td>
          <td style="color:#E04F4F;font-weight:700">-${fmtM(o.amount)}</td>
          <td><span class="tag ${o.status==='paid'?'tg':'ty'}" style="cursor:pointer" onclick="toggleOrder('${o.id}','${o.status}')">${o.status==='paid'?'Pagado':'Pendiente'}</span></td>
          <td>${o.foto_url?`<button class="btn bo bxs" onclick="verImg('${o.id}','order')">${ic('photo',10)} Ver</button>`:`<button class="btn bo bxs" onclick="attachPhoto('${o.id}','order')">${ic('upload',10)} Subir</button>`}</td>
          <td><div style="display:flex;gap:3px">
            <button class="btn bo bxs" onclick="openOrderModal('${o.id}','${pid}','expense')">${ic('edit',10)}</button>
            <button class="btn bd bxs" onclick="deleteOrder('${o.id}')">${ic('trash',10)}</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table></div>`}`;
    }

    if(tab==='ingresos'){
      return`
      <div class="section-head">
        <div class="section-title">Ingresos / Cobros</div>
        <button class="btn bp bsm" onclick="openOrderModal(null,'${pid}','income')">+ Ingreso</button>
      </div>
      ${ordIncome.length===0?`<div style="border:2px dashed var(--border2);border-radius:var(--rl);padding:24px;text-align:center;color:var(--txt3)">Sin ingresos registrados — agrega el primer cobro</div>`:
      `<div class="tw"><table class="tbl">
        <thead><tr><th>Código</th><th>Fecha</th><th>Concepto</th><th>Tipo</th><th>Bruto</th><th>Neto banco</th><th>Cobrado</th><th>Comprobante</th><th></th></tr></thead>
        <tbody>${ordIncome.map(o=>{
          const ants=(DB.anticipos||[]).filter(a=>a.order_id===o.id);
          const antPag=ants.filter(a=>a.pagado).reduce((s,a)=>s+Number(a.monto),0);
          const neto=Number(o.neto_banco||o.amount);
          const pct=neto>0?Math.min(100,Math.round(antPag/neto*100)):0;
          return`<tr>
            <td><span class="mono" style="color:var(--violet)">${o.code}</span></td>
            <td style="font-size:11.5px">${fmtD(o.order_date)}</td>
            <td style="font-weight:600">${o.concept}</td>
            <td><span class="tag ${o.billing_type==='factura_sri'?'tb':'tgr'}" style="font-size:10px">${o.billing_type==='factura_sri'?'Fac. SRI':o.billing_type==='sin_factura'?'Sin Fac.':'Cobro'}</span></td>
            <td style="color:#1A85D6;font-weight:600">${fmtM(o.amount)}</td>
            <td style="font-family:'Outfit',sans-serif;font-weight:800;color:var(--violet)">${fmtM(neto)}</td>
            <td>
              <div style="min-width:90px">
                <div style="height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-bottom:3px"><div style="height:100%;background:${pct>=100?'var(--mint)':'var(--violet)'};width:${pct}%"></div></div>
                <div style="font-size:9.5px;color:var(--txt3)">${fmtM(antPag)} / ${fmtM(neto)}</div>
                <button class="btn bo bxs" style="margin-top:3px;font-size:9.5px" onclick="openAnticiposModal('${o.id}')">+ Anticipos</button>
              </div>
            </td>
            <td>${o.foto_url?`<button class="btn bo bxs" onclick="verImg('${o.id}','order')">${ic('photo',10)} Ver</button>`:`<button class="btn bo bxs" onclick="attachPhoto('${o.id}','order')">${ic('upload',10)} Subir</button>`}</td>
            <td><div style="display:flex;gap:3px">
              <button class="btn bo bxs" onclick="openOrderModal('${o.id}','${pid}','income')">${ic('edit',10)}</button>
              <button class="btn bd bxs" onclick="deleteOrder('${o.id}')">${ic('trash',10)}</button>
            </div></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`}`;
    }

    if(tab==='conciliacion'){
      // Build timeline of all financial events
      const events=[];
      facturas.forEach(inv=>events.push({date:inv.date,type:'factura',label:`Factura ${inv.number}`,val:inv.neto,sign:1,color:'var(--violet)',tag:'tg'}));
      ordExpense.forEach(o=>events.push({date:o.order_date,type:'egreso',label:o.concept,val:o.amount,sign:-1,color:'#E04F4F',tag:'tr'}));
      (DB.anticipos||[]).filter(a=>{const ord=ordIncome.find(o=>o.id===a.order_id);return ord&&a.pagado;}).forEach(a=>{
        const ord=ordIncome.find(o=>o.id===a.order_id);
        events.push({date:a.fecha||a.created_at,type:'cobro',label:`Cobro: ${a.concepto||ord?.concept}`,val:a.monto,sign:1,color:'#00946D',tag:'tg'});
      });
      events.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
      let runningBal=0;
      return`
      <div style="margin-bottom:18px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:20px">
          ${[['Facturado SRI',fmtM(totalFacturado),'#1A85D6','var(--sky)'],['Cobrado real',fmtM(totalCobrado),'#00946D','var(--mint)'],['Costos',fmtM(totalEgresos),'#E04F4F','var(--coral)'],['Utilidad neta',fmtM(utilidad),utilidad>=0?'var(--txt)':'#E04F4F',utilidad>=0?'var(--violet)':'var(--coral)']].map(([l,v,col,fc])=>`<div class="fin-card" style="--fc:${fc}"><div class="fin-lbl">${l}</div><div class="fin-val" style="color:${col}">${v}</div></div>`).join('')}
        </div>
        <div class="section-title" style="margin-bottom:14px">Línea de tiempo financiera</div>
        ${events.length===0?`<div style="text-align:center;padding:30px;color:var(--txt3);border:2px dashed var(--border2);border-radius:var(--rl)">Sin movimientos registrados</div>`:
          events.map(ev=>{
            runningBal+=ev.sign*ev.val;
            return`<div class="concil-row">
              <div class="concil-dot" style="background:${ev.color}"></div>
              <div style="flex:1">
                <div style="font-weight:600;font-size:12.5px">${ev.label}</div>
                <div style="font-size:11px;color:var(--txt3)">${fmtD(ev.date)} · <span class="tag ${ev.tag}" style="font-size:10px">${ev.type}</span></div>
              </div>
              <div style="text-align:right">
                <div style="font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;color:${ev.color}">${ev.sign>0?'+':'-'}${fmtM(ev.val)}</div>
                <div style="font-size:10.5px;color:var(--txt3)">Balance: ${fmtM(runningBal)}</div>
              </div>
            </div>`;
          }).join('')}
      </div>`;
    }

    if(tab==='tareas'){
      const dn=pt.filter(t=>t.done).length;
      const pcPct=pt.length?Math.round(dn/pt.length*100):0;
      return`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:14px">
          ${donut(pcPct,'var(--violet)',50)}
          <div>
            <div class="section-title">Tareas · ${dn}/${pt.length} completadas</div>
            <div class="pb" style="margin-top:8px;width:200px"><div class="pf" style="width:${pcPct}%"></div></div>
          </div>
        </div>
        <button class="btn bp bsm" onclick="openTaskModal(null,'${pid}')">+ Nueva Tarea</button>
      </div>
      ${pt.length===0?`<div style="border:2px dashed var(--border2);border-radius:var(--rl);padding:24px;text-align:center;color:var(--txt3)">Sin tareas — agrega la primera</div>`:
        pt.map(t=>{
          const diff=t.due_date?Math.round((new Date(t.due_date+'T12:00:00')-new Date())/86400000):null;

// ===== FINANCE =====
function renderFinance(){
  const ff=S.finFilter||'all';
  const incomeOrders=DB.orders.filter(o=>o.type==='income');
  const expenseOrders=DB.orders.filter(o=>o.type==='expense');
  const totalNetoBanco=incomeOrders.reduce((s,o)=>s+Number(o.neto_banco||o.amount),0);
  const totalAntCobrado=incomeOrders.reduce((s,o)=>{
    return s+(DB.anticipos||[]).filter(a=>a.order_id===o.id&&a.pagado).reduce((sa,a)=>sa+Number(a.monto),0);
  },0);
  const teP=expenseOrders.filter(o=>o.status==='paid').reduce((s,o)=>s+Number(o.amount),0);
  const teAll=expenseOrders.reduce((s,o)=>s+Number(o.amount),0);
  const porCobrar=Math.max(0,totalNetoBanco-totalAntCobrado);
  const balance=totalAntCobrado-teP;
  let ords=[...DB.orders];
  if(ff!=='all')ords=ords.filter(o=>o.type===ff);
  ords.sort((a,b)=>(b.order_date||'').localeCompare(a.order_date||''));

  return`
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px">
    ${[['Neto banco',fmtM(totalNetoBanco),'var(--violet)','var(--violet)','después de retenciones'],['Cobrado real',fmtM(totalAntCobrado),'#00946D','var(--mint)','llegó al banco'],['Por cobrar',fmtM(porCobrar),'#C97E00','var(--amber)','neto − cobrado'],['Total gastos',fmtM(teAll),'#E04F4F','var(--coral)',fmtM(teP)+' pagado'],['Balance real',fmtM(balance),balance>=0?'var(--txt)':'#E04F4F',balance>=0?'var(--violet)':'var(--coral)','cobrado − gastos']].map(([l,v,col,fc,sub])=>`<div class="fin-card" style="--fc:${fc}"><div class="fin-lbl">${l}</div><div class="fin-val" style="font-size:20px;color:${col}">${v}</div><div class="fin-sub">${sub}</div></div>`).join('')}
  </div>
  <div class="filter-bar">
    <div class="filter-group">
      ${[['all','Todos'],['income','Ingresos'],['expense','Gastos']].map(([v,l])=>`<button class="btn bsm ${ff===v?'bp':'bo'}" onclick="S.finFilter='${v}';render()">${l}</button>`).join('')}
    </div>
    <button class="btn bp" onclick="openOrderModal()">+ Nueva Orden</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tw"><table class="tbl">
      <thead><tr><th>Código</th><th>Fecha</th><th>Proyecto</th><th>Concepto</th><th>Tipo</th><th>Bruto</th><th>Neto banco</th><th>Cobrado</th><th>Estado</th><th></th></tr></thead>
      <tbody>${ords.length===0?`<tr><td colspan="10"><div class="empty">Sin órdenes</div></td></tr>`:
        ords.map(o=>{
          const proj=DB.projects.find(p=>p.id===o.project_id);
          const isIncome=o.type==='income';
          const ants=isIncome?(DB.anticipos||[]).filter(a=>a.order_id===o.id):[];
          const antPag=ants.filter(a=>a.pagado).reduce((s,a)=>s+Number(a.monto),0);
          const neto=Number(o.neto_banco||o.amount);
          const pct=neto>0?Math.min(100,Math.round(antPag/neto*100)):0;
          return`<tr>
            <td><span class="mono" style="color:var(--violet)">${o.code}</span></td>
            <td style="font-size:11.5px">${fmtD(o.order_date)}</td>
            <td style="font-size:11.5px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${proj?.name||'—'}</td>
            <td style="font-size:11.5px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${o.concept}</td>
            <td><span class="tag ${isIncome?'tg':'tr'}">${isIncome?'Ingreso':'Gasto'}</span></td>
            <td style="font-weight:700;color:${isIncome?'#1A85D6':'#E04F4F'}"> ${isIncome?'':'- '}${fmtM(o.amount)}</td>
            <td><span style="font-family:'Outfit',sans-serif;font-weight:800;color:var(--violet)">${isIncome?fmtM(neto):'—'}</span></td>
            <td>${isIncome?`<div style="min-width:80px"><div style="height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-bottom:3px"><div style="height:100%;background:${pct>=100?'var(--mint)':'var(--violet)'};width:${pct}%;border-radius:3px"></div></div><div style="font-size:9.5px;color:var(--txt3)">${fmtM(antPag)} (${pct}%)</div><button class="btn bo bxs" style="margin-top:3px;font-size:9px" onclick="openAnticiposModal('${o.id}')">Anticipos</button></div>`:'<span style="color:var(--txt3)">—</span>'}</td>
            <td><span class="tag ${o.status==='paid'?'tg':'ty'}" style="cursor:pointer" onclick="toggleOrder('${o.id}','${o.status}')">${o.status==='paid'?'Pagado':'Pendiente'}</span></td>
            <td><div style="display:flex;gap:3px">
              ${o.foto_url?`<button class="btn bo bxs" onclick="verImg('${o.id}','order')">${ic('photo',10)}</button>`:''}
              <button class="btn bo bxs" onclick="openOrderModal('${o.id}')">${ic('edit',10)}</button>
              <button class="btn bd bxs" onclick="deleteOrder('${o.id}')">${ic('trash',10)}</button>
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

// ===== MODALS =====
function modal(id,title,body,large=false){
  document.getElementById(id+'_wrap')?.remove();
  const wrap=document.createElement('div');wrap.id=id+'_wrap';wrap.className='ov';
  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.innerHTML=`<div class="modal${large?' modal-lg':''}">
    <div class="mh"><div class="mt">${title}</div><button class="btn bo bxs" onclick="document.getElementById('${id}_wrap').remove()">${ic('x',13)}</button></div>${body}</div>`;
  document.body.appendChild(wrap);
}

function calcProjFiscal(){
  const base=parseFloat($('pr_vl')?.value||0);const iva=parseFloat($('pr_iva')?.value||0);const retiva=parseFloat($('pr_retiva')?.value||0);const retrenta=parseFloat($('pr_retrenta')?.value||0);
  const el=$('proj_fiscal_result');if(!el)return;
  if(!base||base<=0){el.innerHTML='<span>Ingresa el valor del contrato</span>';return;}
  const ivaAmt=round2(base*iva/100);const total=round2(base+ivaAmt);const retIvaAmt=round2(ivaAmt*retiva/100);const retRentaAmt=round2(base*retrenta/100);const neto=round2(total-retIvaAmt-retRentaAmt);
  el.innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px">
    <span>Subtotal: <strong>${fmtM(base)}</strong></span>
    <span style="color:#1A85D6">+IVA: <strong>${fmtM(ivaAmt)}</strong></span>
    <span style="font-weight:700">Total c/IVA: <strong>${fmtM(total)}</strong></span>
    <span style="color:#E04F4F">−Ret: <strong>${fmtM(retIvaAmt+retRentaAmt)}</strong></span>
    <span style="color:#00946D;font-weight:700;font-size:13px">Neto: <strong>${fmtM(neto)}</strong></span>
  </div>`;
}

function setOTab(tab){
  ['sri','gasto','nofac'].forEach(t=>{
    const btn=$(`ot_${t}`);const sec=$(`os_${t}`);
    if(btn)btn.classList.toggle('on',t===tab.replace('factura_','').replace('sin_factura','nofac').replace('gasto','gasto'));
    if(sec)sec.style.display='none';
  });
  const map={factura_sri:'sri',gasto:'gasto',sin_factura:'nofac'};
  const k=map[tab];if(k){const btn=$(`ot_${k}`);const sec=$(`os_${k}`);if(btn)btn.classList.add('on');if(sec)sec.style.display='block';}
  const bt=$('obt');if(bt)bt.value=tab;
}

function previewFoto(input,zoneId,dataId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const data=e.target.result;
    const zone=$(zoneId);if(!zone)return;
    zone.innerHTML=`<img src="${data}" style="max-height:80px;border-radius:4px;object-fit:contain"><div style="font-size:9.5px;color:var(--txt3);margin-top:3px">${file.name}</div>`;
    const di=$(dataId);if(di)di.value=data;
  };
  reader.readAsDataURL(file);
}

function verImg(id,type){
  let url='';
  if(type==='order'){const o=DB.orders.find(x=>x.id===id);url=o?.foto_url||'';}
  else if(type==='inv'){const i=DB.invoices.find(x=>x.id===id);url=i?.foto_url||'';}
  if(!url)return;
  const wrap=document.createElement('div');wrap.className='ov';wrap.onclick=()=>wrap.remove();
  wrap.innerHTML=`<div style="background:#fff;border-radius:18px;padding:18px;max-width:640px;width:96%;text-align:center;box-shadow:var(--sh3)">
    <img src="${url}" style="max-width:100%;border-radius:12px;max-height:75vh;object-fit:contain">
    <div style="margin-top:12px"><button class="btn bo" onclick="this.closest('.ov').remove()">Cerrar</button></div>
  </div>`;
  document.body.appendChild(wrap);
}

function attachPhoto(id,type){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const data=ev.target.result;
      if(type==='order')await dbUpdate('orders',id,{foto_url:data});
      else if(type==='inv')await dbUpdate('invoices',id,{foto_url:data});
      toast('Comprobante guardado');render();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function calcTaxSRI(){
  const a=parseFloat($('oa_sri')?.value||0);const ivaPct=parseFloat($('oip_sri')?.value||15);const retPct=parseFloat($('orp_sri')?.value||0);const ivaRetPct=parseFloat($('oirp_sri')?.value||30);
  const el=$('sri_desglose');if(!el||!a)return;
  const ivaAmt=round2(a*ivaPct/100);const totalConIva=round2(a+ivaAmt);const retRenta=round2(a*retPct/100);const retIva=round2(ivaAmt*ivaRetPct/100);const neto=round2(totalConIva-retRenta-retIva);
  el.innerHTML=`<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;padding:8px;background:var(--surface);border-radius:var(--r);border:1px solid var(--border)">
    <span>Base: <strong>${fmtM(a)}</strong></span>
    <span style="color:#1A85D6">+IVA: <strong>+${fmtM(ivaAmt)}</strong></span>
    <span style="font-weight:700">Total c/IVA: <strong>${fmtM(totalConIva)}</strong></span>
    <span style="color:#E04F4F">−Ret: <strong>-${fmtM(retRenta+retIva)}</strong></span>
    <span style="color:#00946D;font-weight:700;font-size:13px">Neto: <strong>${fmtM(neto)}</strong></span>
  </div>`;
}

async function saveProject(pid){
  if(_isSavingProject)return;_isSavingProject=true;
  const btn=$('save_proj_btn');if(btn){btn.disabled=true;btn.textContent='Guardando…';}
  const cl=$('pr_cl')?.value;const nm=$('pr_nm')?.value?.trim();const s=$('pr_s')?.value;
  if(!cl||!nm||!s){toast('Completa los campos obligatorios','te');_isSavingProject=false;if(btn){btn.disabled=false;btn.textContent='Guardar proyecto';}return;}
  const rows=document.querySelectorAll('#prows>div');const sched=[];let tot=0;
  rows.forEach(r=>{const ins=r.querySelectorAll('input');const pct=parseFloat(ins[0]?.value||0);const lbl=ins[1]?.value?.trim();const dt=ins[2]?.value;if(pct>0&&lbl){sched.push({pct,label:lbl,due_date:dt||null,paid:false});tot+=pct;}});
  if(sched.length&&Math.abs(tot-100)>.5){toast('Las cuotas deben sumar 100%','te');_isSavingProject=false;if(btn){btn.disabled=false;btn.textContent='Guardar proyecto';}return;}
  const pd={client_id:cl,name:nm,start_date:s,end_date:$('pr_e')?.value||null,contract_value:parseFloat($('pr_vl')?.value)||0,notes:$('pr_nt')?.value||null};
  if(pid){await dbUpdate('projects',pid,pd);const old=DB.payment_schedule.filter(x=>x.project_id===pid);for(const x of old)await dbDelete('payment_schedule',x.id);for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:pid});}
  else{const np=await dbInsert('projects',{...pd,code:await nextCode('PROJ'),status:'active'});if(np&&sched.length)for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:np.id});}
  toast(pid?'Proyecto actualizado':'Proyecto creado');document.getElementById('project_wrap')?.remove();_isSavingProject=false;render();
}

  if(!confirm('¿Eliminar proyecto, tareas y órdenes?'))return;
  for(const t of DB.tasks.filter(t=>t.project_id===id))await dbDelete('tasks',t.id);
  for(const o of DB.orders.filter(o=>o.project_id===id))await dbDelete('orders',o.id);

  await dbDelete('projects',id);toast('Proyecto eliminado');render();
}

  const bt=$('obt')?.value||'factura_sri';
  let pid,cn,am,dt,status,inv_num=null,foto_url=null,neto_banco=null;
  let ivaPct=0,ivaAmt=0,retPct=0,retAmt=0,ivaRetPct=0,ivaRetAmt=0,expCat=null;

  if(bt==='factura_sri'){
    pid=$('op_sri')?.value||null;cn=$('oc_sri')?.value?.trim();am=parseFloat($('oa_sri')?.value||0);
    dt=$('od_sri')?.value||today();status=$('os_st_sri')?.value||'pending';inv_num=$('oi_sri')?.value?.trim()||null;
    ivaPct=parseFloat($('oip_sri')?.value||15);retPct=parseFloat($('orp_sri')?.value||0);ivaRetPct=parseFloat($('oirp_sri')?.value||30);
    ivaAmt=round2(am*ivaPct/100);const totalConIva=round2(am+ivaAmt);retAmt=round2(am*retPct/100);ivaRetAmt=round2(ivaAmt*ivaRetPct/100);
    neto_banco=round2(totalConIva-retAmt-ivaRetAmt);
    foto_url=$('fd_sri')?.value||null;
    if(!cn||!am){toast('Completa concepto y monto','te');return;}
  }else if(bt==='gasto'){
    pid=$('op_gasto')?.value||null;cn=$('oc_gasto')?.value?.trim();am=parseFloat($('oa_gasto')?.value||0);
    dt=$('od_gasto')?.value||today();status=$('os_gasto_s')?.value||'pending';inv_num=$('oi_gasto')?.value?.trim()||null;
    expCat=$('ocat_gasto')?.value||null;foto_url=$('fd_gasto')?.value||null;
    if(!cn||!am){toast('Completa concepto y monto','te');return;}
  }else{
    pid=$('op_nofac')?.value||null;cn=$('oc_nofac')?.value?.trim();am=parseFloat($('oa_nofac')?.value||0);
    dt=$('od_nofac')?.value||today();status=$('os_nofac_s')?.value||'pending';neto_banco=am;
    if(!cn||!am){toast('Completa concepto y monto','te');return;}
  }

  const isIncome=bt!=='gasto';
  const d={project_id:pid,type:isIncome?'income':'expense',billing_type:bt,concept:cn,amount:am,neto_banco:isIncome?(neto_banco||am):null,order_date:dt,status,invoice_num:inv_num,has_iva:ivaPct>0,iva_pct:ivaPct,iva_amount:ivaAmt,has_retention:retPct>0,retention_pct:retPct,retention_amount:retAmt,has_iva_retention:ivaRetPct>0,iva_retention_pct:ivaRetPct,iva_retention_amount:ivaRetAmt,expense_category:expCat,foto_url};
  if(bt==='factura_sri'&&inv_num){const inv=DB.invoices.find(x=>x.number===inv_num);if(inv)d.invoice_id=inv.id;}
  if(oid){await dbUpdate('orders',oid,d);toast('Orden actualizada');}
  else{d.code=await nextCode(isIncome?'ODC':'ODP');await dbInsert('orders',d);toast('Orden registrada');}
  document.getElementById('order_wrap')?.remove();render();
}

async function toggleOrder(id,cur){const ns=cur==='paid'?'pending':'paid';await dbUpdate('orders',id,{status:ns});render();}
async function deleteOrder(id){if(!confirm('¿Eliminar orden?'))return;await dbDelete('orders',id);toast('Orden eliminada');render();}

async function saveInvoice(iid=''){
  const num=$('inv_num')?.value?.trim();const sub=parseFloat($('inv_sub')?.value||0);
  if(!num){toast('Ingresa el número de factura','te');return;}
  if(!sub||sub<=0){toast('Ingresa el subtotal','te');return;}
  const ivaPct=parseFloat($('inv_iva_pct')?.value||0);const retPct=parseFloat($('inv_ret_pct')?.value||0);const retIvaPct=parseFloat($('inv_retiva_pct')?.value||0);
  const c=calcInvoice(sub,ivaPct,retPct,retIvaPct);
  const fotoData=$('fd_inv')?.value||null;
  const d={number:num,date:$('inv_dt')?.value||today(),project_id:$('inv_proj')?.value||null,client_id:$('inv_cl')?.value||null,concept:$('inv_concept')?.value||null,subtotal:c.subtotal,iva_pct:ivaPct,iva_amt:c.ivaAmt,total_con_iva:c.totalConIva,ret_renta_pct:retPct,ret_renta:c.retRenta,ret_iva_pct:retIvaPct,ret_iva:c.retIva,neto:c.neto,cobrada:$('inv_status')?.value==='1',notes:$('inv_notes')?.value||null};
  if(fotoData)d.foto_url=fotoData;
  if(iid){await dbUpdate('invoices',iid,d);toast('Factura actualizada');}
  else{const code=await nextCode('FAC');await dbInsert('invoices',{...d,code});toast('Factura registrada');}
  document.getElementById('inv_wrap')?.remove();render();
}
async function toggleInvoicePaid(id,cobrada){await dbUpdate('invoices',id,{cobrada,cobrada_at:cobrada?new Date().toISOString():null});render();}
async function deleteInvoice(id){if(!confirm('¿Eliminar factura?'))return;await dbDelete('invoices',id);toast('Factura eliminada');render();}

async function saveQuote(qid,status){
  const rec=$('q_rec')?.value?.trim();if(!rec){toast('Ingresa el destinatario','te');return;}
  const d={recipient:rec,subject:$('q_sub')?.value?.trim(),body:$('q_body')?.innerHTML||'',date:$('q_dt')?.value||today(),valid_until:$('q_vld')?.value||null,notes:$('q_notes')?.value||null,status};
  let saved;
  if(qid){await dbUpdate('quotes',qid,d);saved={id:qid,...d};}
  else{d.code=await nextCode('COT');saved=await dbInsert('quotes',d);}
  toast(status==='sent'?'Cotización emitida':'Borrador guardado');document.getElementById('qedit_wrap')?.remove();render();
  if(status==='sent'&&saved)setTimeout(()=>printQuote(saved.id||qid),300);
}
async function deleteQuote(id){if(!confirm('¿Eliminar?'))return;await dbDelete('quotes',id);toast('Eliminada');render();}

// BOOT
async function startApp(){
  $('loadingScreen').style.display='flex';
  if(KEYS_OK){$('loadMsg').textContent='Conectando con Supabase…';const ok=await loadFromSupabase();if(ok){$('loadMsg').textContent='Cargando plantilla…';await loadTemplate();}}
  const ls=$('loadingScreen');ls.classList.add('fade');setTimeout(()=>ls.remove(),400);
  render();
}
</script>
