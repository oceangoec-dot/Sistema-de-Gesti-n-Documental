<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oceango · Sistema de Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Verdes principales — más moderados */
  --dk:#0f3d2b;      /* sidebar oscuro */
  --mid:#1a5c42;     /* hover sidebar */
  --base:#2a7d5e;    /* acciones primarias */
  --light:#3da882;   /* hovers */
  --teal:#38b2aa;    /* acentos turquesa */
  --tl:#93ddd8;      /* turquesa claro */
  --tp:#eaf7f5;      /* fondos suaves */

  /* Neutrales — más presencia para descanso visual */
  --bg:#f5f7f6;      /* fondo app (casi blanco con un toque) */
  --wh:#ffffff;
  --br:#dde8e5;      /* bordes */
  --brl:#edf3f1;     /* bordes muy suaves */

  /* Textos */
  --tx:#1a2e28;      /* texto principal */
  --mu:#4d6e64;      /* texto secundario */
  --so:#8aaca5;      /* texto terciario / labels */

  /* Semánticos */
  --re:#dc2626;--rb:#fee2e2;--rt:#991b1b;
  --yb:#fef3c7;--yt:#92400e;
  --bb:#dbeafe;--bt:#1e40af;
  --gb:#dcfce7;--gt:#15803d;
  --pu:#f3e8ff;--pt:#7c3aed;   /* morado para cotizaciones */

  --r:10px;--rs:6px;--rm:8px
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow:hidden}

/* ── PIN LOCK ── */
#pinLock{position:fixed;inset:0;background:var(--dk);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
#pinLock.gone{display:none}
.pin-logo{font-family:'Sora',sans-serif;font-size:36px;font-weight:700;color:#fff;letter-spacing:-1px;margin-bottom:6px}
.pin-logo span{color:var(--tl)}
.pin-sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:36px}
.pin-dots{display:flex;gap:14px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:all .2s}
.pin-dot.filled{background:var(--tl);border-color:var(--tl)}
.pin-dot.error{background:var(--re);border-color:var(--re)}
.pin-grid{display:grid;grid-template-columns:repeat(3,70px);gap:10px}
.pin-btn{height:70px;border-radius:var(--r);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:#fff;font-size:22px;font-family:'Sora',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.pin-btn:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.25)}
.pin-btn:active{transform:scale(.94);background:rgba(255,255,255,.22)}
.pin-btn.del{font-size:16px;color:rgba(255,255,255,.5)}
.pin-err{color:#f87171;font-size:12px;margin-top:10px;height:16px;text-align:center}

/* ── LOADING ── */
#loadingScreen{position:fixed;inset:0;background:var(--dk);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#loadingScreen.fade{opacity:0;pointer-events:none}
.load-logo{font-family:'Sora',sans-serif;font-size:32px;font-weight:700;color:#fff;margin-bottom:8px}
.load-logo span{color:var(--tl)}
.load-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.load-bar{width:180px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--tl);border-radius:2px;animation:lf 1.4s ease forwards}
@keyframes lf{from{width:0}to{width:100%}}
.load-msg{font-size:11px;color:rgba(255,255,255,.3);margin-top:12px}

/* ── APP LAYOUT ── */
.app{display:flex;height:100vh}
.sb{width:220px;background:var(--dk);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.05)}
.logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-name{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1}
.logo-name span{color:var(--tl)}
.logo-sub{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;
  color:rgba(255,255,255,.5);font-size:13px;font-weight:500;transition:all .15s;
  margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.ni.on{background:rgba(255,255,255,.12);color:#fff;font-weight:600}
.ni svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.ni.on svg{opacity:1}
.nbadge{background:var(--re);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:auto}
.sbfoot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.18)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{background:var(--wh);border-bottom:1px solid var(--br);padding:0 24px;height:54px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ptitle{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--tx)}
.dchip{font-size:12px;color:var(--mu);background:var(--bg);padding:4px 12px;border-radius:20px;border:1px solid var(--br)}
.content{flex:1;overflow-y:auto;padding:22px 24px}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;
  border:none;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;line-height:1}
.bp{background:var(--base);color:#fff}.bp:hover{background:var(--mid)}
.bo{background:transparent;border:1px solid var(--br);color:var(--mu)}.bo:hover{background:var(--tp)}
.bd{background:var(--rb);color:var(--rt)}.bd:hover{background:#fecaca}
.bsm{padding:5px 10px;font-size:12px}.bxs{padding:3px 7px;font-size:11px}

/* ── CARDS ── */
.card{background:var(--wh);border:1px solid var(--br);border-radius:var(--r);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.csm{padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tg{background:var(--gb);color:var(--gt)}
.ty{background:var(--yb);color:var(--yt)}
.tb{background:var(--bb);color:var(--bt)}
.tr{background:var(--rb);color:var(--rt)}
.tgr{background:#f1f5f9;color:#475569}
.ttl{background:var(--tp);color:var(--mid)}
.tpu{background:var(--pu);color:var(--pt)}

/* ── STATS ── */
.lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--so);margin-bottom:5px}
.val{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;color:var(--tx)}

/* ── PROGRESS ── */
.pb{height:6px;background:#e8eeec;border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--base),var(--teal));border-radius:3px;transition:width .5s}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.7px;color:var(--so);border-bottom:1px solid var(--br);background:#fafcfb}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--brl);color:var(--tx);vertical-align:middle}
.tbl tr:hover td{background:#fafcfb}
.tbl tr:last-child td{border-bottom:none}
.tw{overflow-x:auto}

/* ── FORM ── */
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:8px 10px;border:1px solid var(--br);border-radius:var(--rs);
  font-size:13px;font-family:inherit;color:var(--tx);background:var(--wh);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--base);box-shadow:0 0 0 3px rgba(42,125,94,.12)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── MODAL ── */
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--wh);border-radius:var(--r);padding:24px;width:580px;max-width:100%;
  max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.18)}
.modal-lg{width:860px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mt{font-family:'Sora',sans-serif;font-size:16px;font-weight:600;color:var(--tx)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--br)}
.div{height:1px;background:var(--br);margin:14px 0}
.stitle{font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--tx);margin-bottom:10px}

/* ── TASKS ── */
.ti{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--rm);
  border:1px solid var(--br);margin-bottom:7px;background:var(--wh);transition:all .15s}
.ti:hover{border-color:var(--base);background:var(--tp)}
.ti.done{opacity:.5}
.chk{width:17px;height:17px;border-radius:4px;border:2px solid var(--br);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px}
.chk.on{background:var(--base);border-color:var(--base)}

/* ── CALENDAR ── */
.cal-wrap{background:var(--wh);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:var(--dk);color:#fff}
.cal-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:600}
.cal-nav{background:rgba(255,255,255,.12);border:none;color:#fff;cursor:pointer;
  padding:5px 11px;border-radius:6px;font-size:15px;font-family:inherit;transition:background .15s}
.cal-nav:hover{background:rgba(255,255,255,.22)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--so);padding:7px 4px;
  background:#fafcfb;border-bottom:1px solid var(--br);text-transform:uppercase;letter-spacing:.5px}
.cal-day{min-height:74px;border-right:1px solid var(--brl);border-bottom:1px solid var(--brl);
  padding:5px 6px;cursor:default;transition:background .1s}
.cal-day:hover{background:var(--tp)}
.cal-day.today{background:#eef8f5}
.cal-day.today .cal-dn{color:var(--base);font-weight:700;background:var(--base);color:#fff;
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-day.other-month{opacity:.3}
.cal-day:nth-child(7n){border-right:none}
.cal-dn{font-size:11px;font-weight:500;color:var(--mu);margin-bottom:3px;line-height:1}
.cal-ev{background:var(--base);color:#fff;border-radius:3px;padding:2px 5px;
  font-size:9px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;line-height:1.4}
.cal-ev:hover{background:var(--mid)}
.cal-ev.urgent{background:#dc2626}
.cal-ev.done-ev{background:var(--so)}

/* ── TOAST ── */
.twrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;color:#fff;
  animation:sin .25s ease;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.ts{background:var(--base)}.te{background:#dc2626}.ti2{background:#3b82f6}
@keyframes sin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:48px 20px;color:var(--mu)}
.ei{font-size:36px;margin-bottom:10px;opacity:.35}

/* ── QUOTE EDITOR ── */
.quote-editor{border:1px solid var(--br);border-radius:var(--rs);min-height:200px;padding:12px;
  font-size:13px;font-family:inherit;outline:none;line-height:1.55;color:var(--tx)}
.quote-editor:focus{border-color:var(--base);box-shadow:0 0 0 3px rgba(42,125,94,.1)}
.quote-editor p{margin:0 0 4px}
.editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;padding:8px;
  background:#fafcfb;border:1px solid var(--br);border-radius:var(--rs)}
.tb-btn{padding:4px 8px;border:1px solid var(--br);border-radius:4px;background:var(--wh);
  cursor:pointer;font-size:12px;font-family:inherit;color:var(--mu);transition:all .1s}
.tb-btn:hover{background:var(--tp);border-color:var(--base)}

/* ── TASK DETAIL ── */
.task-detail .td-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px}
.task-detail .td-label{font-weight:600;color:var(--mu);min-width:80px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}

/* ── NOTIF BAR ── */
.notif-bar{background:linear-gradient(135deg,#1a4f3a,var(--base));color:#fff;padding:8px 24px;
  font-size:12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.notif-bar.hide{display:none}

/* ── STATUS BANNER ── */
.cfg-banner{padding:8px 24px;font-size:12px;display:flex;align-items:center;gap:8px;flex-shrink:0;color:#fff}
.cfg-banner.ok{background:var(--mid)}
.cfg-banner.warn{background:#92400e}

/* ── TAX SECTION ── */
.tax-section{background:#fafcfb;border:1px solid var(--br);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.tax-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.tax-row:last-child{margin-bottom:0}
.tax-label{display:flex;align-items:center;gap:6px;cursor:pointer;min-width:160px}
.tax-amount{font-weight:600;color:var(--base);margin-left:auto;font-size:12px}

/* ── TEMPLATE DROP ── */
.tpl-zone{border:2px dashed var(--br);border-radius:var(--r);padding:32px 20px;text-align:center;
  transition:all .2s;cursor:pointer;background:#fafcfb;position:relative}
.tpl-zone:hover,.tpl-zone.drag{border-color:var(--base);background:var(--tp)}
.tpl-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.tpl-preview{border:1px solid var(--br);border-radius:var(--rm);overflow:hidden;max-height:180px;
  display:flex;align-items:center;justify-content:center;background:#f1f5f9}
.tpl-preview img{width:100%;height:180px;object-fit:contain}

/* ── PAGER ── */
.pager{display:flex;align-items:center;gap:5px;justify-content:center;margin-top:10px;
  padding-top:10px;border-top:1px solid var(--brl)}
.pg{padding:3px 9px;border-radius:var(--rs);border:1px solid var(--br);background:var(--wh);
  color:var(--mu);font-size:12px;cursor:pointer;font-family:inherit}
.pg:hover{background:var(--tp);border-color:var(--base)}
.pg.on{background:var(--base);color:#fff;border-color:var(--base)}
.pg:disabled{opacity:.3;cursor:default}

/* ── PROJECT ROW (dashboard) ── */
.proj-row{padding:10px 12px;border-radius:var(--rm);border:1px solid var(--br);margin-bottom:8px;
  background:var(--wh);cursor:pointer;transition:all .15s}
.proj-row:hover{border-color:var(--base);background:var(--tp)}

@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}}
@media(max-width:640px){
  .sb{width:52px}.logo-name,.logo-sub,.sbfoot,.ni span:not(.nbadge){display:none}
  .ni{justify-content:center}.g2,.g4{grid-template-columns:1fr}.fr,.fr3{grid-template-columns:1fr}
  .modal,.modal-lg{padding:16px;width:98vw}.content{padding:14px}
}
@media print{
  .sb,.topbar,.notif-bar,.twrap,#loadingScreen,.cfg-banner,#pinLock{display:none!important}
  .main{overflow:visible}.content{padding:0;overflow:visible}body{overflow:visible}
}
</style>
</head>
<body>

<!-- ── PIN LOCK ── -->
<div id="pinLock">
  <div class="pin-logo">O<span>ceango</span></div>
  <div class="pin-sub">Gestión Documental</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress(1)">1</button>
    <button class="pin-btn" onclick="pinPress(2)">2</button>
    <button class="pin-btn" onclick="pinPress(3)">3</button>
    <button class="pin-btn" onclick="pinPress(4)">4</button>
    <button class="pin-btn" onclick="pinPress(5)">5</button>
    <button class="pin-btn" onclick="pinPress(6)">6</button>
    <button class="pin-btn" onclick="pinPress(7)">7</button>
    <button class="pin-btn" onclick="pinPress(8)">8</button>
    <button class="pin-btn" onclick="pinPress(9)">9</button>
    <button class="pin-btn del" onclick="pinClear()">CLR</button>
    <button class="pin-btn" onclick="pinPress(0)">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-err" id="pinErr"></div>
</div>

<!-- ── LOADING ── -->
<div id="loadingScreen" style="display:none">
  <div class="load-logo">O<span>ceango</span></div>
  <div class="load-sub">Gestión Documental</div>
  <div class="load-bar"><div class="load-fill"></div></div>
  <div class="load-msg" id="loadMsg">Conectando…</div>
</div>

<div class="twrap" id="tw"></div>
<div class="app" id="app"></div>

<script>
// ============================================================
//  CONFIGURACIÓN
// ============================================================
const SUPABASE_URL  = 'https://nnprymjwaxtpbiitlcyh.supabase.co/';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ucHJ5bWp3YXh0cGJpaXRsY3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzkwODIsImV4cCI6MjA5MzE1NTA4Mn0.K7Zo3z0rrZea-iipqARGOC4iQdS1bJXVCLksxI_Ru0w';
const PIN_CORRECT   = '1001';

const KEYS_OK = SUPABASE_URL.includes('supabase.co') && SUPABASE_ANON.length > 20;
let sb = null;
if(KEYS_OK){ sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON); }

// ============================================================
//  PIN LOCK
// ============================================================
let _pin = '';
function pinPress(n){
  if(_pin.length >= 4) return;
  _pin += String(n);
  updateDots();
  if(_pin.length === 4) setTimeout(checkPin, 120);
}
function pinDel(){ _pin = _pin.slice(0,-1); updateDots(); }
function pinClear(){ _pin = ''; updateDots(); }
function updateDots(err=false){
  for(let i=0;i<4;i++){
    const d = document.getElementById('d'+i);
    d.className = 'pin-dot' + (i < _pin.length ? (err?' error':' filled') : '');
  }
}
function checkPin(){
  if(_pin === PIN_CORRECT){
    document.getElementById('pinLock').classList.add('gone');
    startApp();
  } else {
    updateDots(true);
    document.getElementById('pinErr').textContent = 'PIN incorrecto';
    setTimeout(()=>{ _pin=''; updateDots(); document.getElementById('pinErr').textContent=''; }, 900);
  }
}

// ============================================================
//  HELPERS
// ============================================================
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().split('T')[0];
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36);
const fmtD=d=>{if(!d)return'—';const p=d.includes('T')?new Date(d):new Date(d+'T12:00:00');return p.toLocaleDateString('es-EC',{day:'2-digit',month:'short',year:'numeric'});};
const fmtDS=d=>{if(!d)return'—';const p=d.includes('T')?new Date(d):new Date(d+'T12:00:00');return p.toLocaleDateString('es-EC',{day:'2-digit',month:'short'});};
const fmtM=n=>'$'+(Number(n)||0).toLocaleString('es-EC',{minimumFractionDigits:2,maximumFractionDigits:2});

let DB={clients:[],projects:[],payment_schedule:[],tasks:[],orders:[],quotes:[]};
const TABLES_WITH_UPDATED=['projects','payment_schedule','tasks','orders','quotes'];

async function loadFromSupabase(){
  if(!sb)return false;
  try{
    $('loadMsg').textContent='Cargando datos…';
    const [c,p,ps,t,o,q]=await Promise.all([
      sb.from('clients').select('*'),
      sb.from('projects').select('*'),
      sb.from('payment_schedule').select('*'),
      sb.from('tasks').select('*').order('step_order'),
      sb.from('orders').select('*').order('order_date',{ascending:false}),
      sb.from('quotes').select('*').order('created_at',{ascending:false})
    ]);
    DB.clients=c.data||[];DB.projects=p.data||[];DB.payment_schedule=ps.data||[];
    DB.tasks=t.data||[];DB.orders=o.data||[];DB.quotes=q.data||[];
    return true;
  }catch(e){console.error(e);return false;}
}

async function nextCode(prefix){
  const key=`oceango_seq_${prefix}`;
  const n=(parseInt(localStorage.getItem(key)||'0'))+1;
  localStorage.setItem(key,n);
  return `${prefix}-${String(n).padStart(4,'0')}-${new Date().getFullYear()}`;
}

async function dbInsert(table,row){
  const r={...row,id:uid(),created_at:new Date().toISOString()};
  if(sb){
    const {data,error}=await sb.from(table).insert(r).select().single();
    if(error){toast('Error: '+error.message,'te');console.error(error);return null;}
    DB[table]=[...(DB[table]||[]),data];return data;
  }
  DB[table]=[...(DB[table]||[]),r];return r;
}
async function dbUpdate(table,id,changes){
  const upd=TABLES_WITH_UPDATED.includes(table)?{...changes,updated_at:new Date().toISOString()}:{...changes};
  if(sb){
    const {error}=await sb.from(table).update(upd).eq('id',id);
    if(error){toast('Error: '+error.message,'te');console.error(error);return false;}
  }
  DB[table]=DB[table].map(r=>r.id===id?{...r,...upd}:r);return true;
}
async function dbDelete(table,id){
  if(sb){
    const {error}=await sb.from(table).delete().eq('id',id);
    if(error){toast('Error: '+error.message,'te');return false;}
  }
  DB[table]=DB[table].filter(r=>r.id!==id);return true;
}

let _tpl=null;
async function loadTemplate(){
  if(sb){
    try{
      const {data}=await sb.from('app_settings').select('value').eq('key','quote_template').single();
      if(data?.value)_tpl=JSON.parse(data.value);
    }catch{}
  }else{
    try{const s=localStorage.getItem('oceango_tpl_v2');if(s)_tpl=JSON.parse(s);}catch{}
  }
}
async function saveTemplate(pages){
  const obj={pages,updatedAt:new Date().toISOString()};_tpl=obj;
  const val=JSON.stringify(obj);
  if(sb){
    const{error}=await sb.from('app_settings').upsert({key:'quote_template',value:val,updated_at:new Date().toISOString()},{onConflict:'key'});
    if(error){toast('Error al guardar plantilla: '+error.message,'te');return;}
    toast('Plantilla guardada en la nube ☁');
  }else{
    try{localStorage.setItem('oceango_tpl_v2',val);toast('Plantilla guardada');}
    catch{toast('Plantilla muy grande para offline','te');return;}
  }
  render();
}
async function clearTemplate(){
  _tpl=null;
  if(sb)await sb.from('app_settings').delete().eq('key','quote_template');
  else localStorage.removeItem('oceango_tpl_v2');
  toast('Plantilla eliminada');render();
}
async function processPDFTemplate(file){
  toast('Procesando PDF…','ti2');
  try{
    if(!window.pdfjsLib){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    const pages=[];
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const sc=2.0;const vp=page.getViewport({scale:sc});
      const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
      pages.push(canvas.toDataURL('image/jpeg',0.9));
    }
    saveTemplate(pages);
  }catch(e){console.error(e);toast('Error al procesar PDF','te');}
}
function handleTplFile(file){
  if(!file)return;
  if(file.type!=='application/pdf'){toast('Solo se aceptan archivos PDF','te');return;}
  processPDFTemplate(file);
}
document.addEventListener('dragover',e=>{const z=$('tpl_drop');if(z){e.preventDefault();z.classList.add('drag');}});
document.addEventListener('dragleave',()=>{const z=$('tpl_drop');if(z)z.classList.remove('drag');});
document.addEventListener('drop',e=>{const z=$('tpl_drop');if(!z)return;e.preventDefault();z.classList.remove('drag');const f=e.dataTransfer?.files?.[0];if(f)handleTplFile(f);});

function requestNotifPermission(){
  if('Notification'in window&&Notification.permission==='default'){
    Notification.requestPermission().then(p=>{if(p==='granted'){toast('Notificaciones activadas');scheduleNotifs();}});
  }
}
function scheduleNotifs(){
  DB.tasks.filter(t=>!t.done&&t.due_date).forEach(t=>{
    const diff=Math.round((new Date(t.due_date+'T12:00:00')-new Date())/86400000);
    if((diff===0||diff===1)&&Notification.permission==='granted')
      new Notification('Oceango — Tarea próxima',{body:diff===0?`HOY: ${t.title}`:` MAÑANA: ${t.title}`});
  });
}

function renderDash(){
  const allIn=DB.orders.filter(o=>o.type==='income');
  const allEx=DB.orders.filter(o=>o.type==='expense');
  const ti=allIn.reduce((s,o)=>s+Number(o.amount),0);
  const te=allEx.reduce((s,o)=>s+Number(o.amount),0);
  const tiP=allIn.filter(o=>o.status==='paid').reduce((s,o)=>s+Number(o.amount),0);
  const teP=allEx.filter(o=>o.status==='paid').reduce((s,o)=>s+Number(o.amount),0);
  const bal=tiP-teP;
  const ap=DB.projects.filter(p=>p.status==='active');
  const up=DB.tasks.filter(t=>{
    if(t.done||!t.due_date)return false;
    return(new Date(t.due_date+'T12:00:00')-new Date())/86400000>=-1&&(new Date(t.due_date+'T12:00:00')-new Date())/86400000<=7;
  }).sort((a,b)=>a.due_date.localeCompare(b.due_date));

  const tot1=Math.ceil(ap.length/PPP)||1,tot2=Math.ceil(up.length/TPP)||1;
  if(S.dpPg>=tot1)S.dpPg=0;if(S.dtPg>=tot2)S.dtPg=0;
  const apS=ap.slice(S.dpPg*PPP,(S.dpPg+1)*PPP);
  const upS=up.slice(S.dtPg*TPP,(S.dtPg+1)*TPP);

  const mkPager=(cur,total,key)=>{
    if(total<=1)return'';
    return`<div class="pager">
      <button class="pg"${cur===0?' disabled':''} onclick="S.${key}--;render()">‹</button>
      ${Array.from({length:total},(_,i)=>`<button class="pg${i===cur?' on':''}" onclick="S.${key}=${i};render()">${i+1}</button>`).join('')}
      <button class="pg"${cur>=total-1?' disabled':''} onclick="S.${key}++;render()">›</button>
    </div>`;
  };

  return`
  <div class="g4" style="margin-bottom:20px">
    ${statCard('Proyectos activos',ap.length,'')}
    ${statCard('Ingresos registrados',fmtM(ti),fmtM(tiP)+' cobrado','var(--base)')}
    ${statCard('Gastos registrados',fmtM(te),fmtM(teP)+' pagado','#e05252')}
    ${statCard('Balance',fmtM(bal),'cobrado − pagado',bal>=0?'var(--tx)':'var(--re)')}
  </div>
  <div class="g2" style="margin-bottom:20px">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="stitle" style="margin-bottom:0">📊 Avance de Proyectos</div>
        <span style="font-size:11px;color:var(--mu)">${ap.length} activo${ap.length!==1?'s':''}</span>
      </div>
      ${ap.length===0?`<div class="empty"><div class="ei">📋</div>Sin proyectos activos</div>`:
        apS.map(p=>{
          const cl=DB.clients.find(c=>c.id===p.client_id);
          const pt=DB.tasks.filter(t=>t.project_id===p.id);
          const dn=pt.filter(t=>t.done).length;
          const pc=pt.length?Math.round(dn/pt.length*100):0;
          const ps=DB.payment_schedule.filter(x=>x.project_id===p.id);
          return`<div class="proj-row" onclick="showProjectDetail('${p.id}')">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
              <div>
                <div style="font-weight:600;font-size:13px;color:var(--tx)">${p.name}</div>
                <div style="font-size:11px;color:var(--mu)">${cl?.name||'—'} · <span style="font-family:monospace">${p.code}</span></div>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-family:Sora;font-weight:700;font-size:14px;color:var(--base)">${pc}%</span>
                <span style="color:var(--so);font-size:12px">›</span>
              </div>
            </div>
            <div class="pb"><div class="pf" style="width:${pc}%"></div></div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:7px">
              ${ps.map(x=>`<span class="tag ${x.paid?'tg':'tgr'}" style="font-size:10px;cursor:pointer" onclick="event.stopPropagation();togglePS('${x.id}',${!x.paid})">${x.label} ${x.pct}%${x.paid?' ✓':''}</span>`).join('')}

function showProjectDetail(pid){
  const p=DB.projects.find(x=>x.id===pid);if(!p)return;
  const cl=DB.clients.find(c=>c.id===p.client_id);
  const pt=DB.tasks.filter(t=>t.project_id===p.id).sort((a,b)=>(a.step_order||0)-(b.step_order||0));

function renderCalendar(){
  const yr=S.calYear,mo=S.calMonth;
  const firstDay=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const td=today();
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let cells='';
  for(let i=0;i<firstDay;i++){const pd=new Date(yr,mo,0).getDate();cells+=`<div class="cal-day other-month"><div class="cal-dn">${pd-firstDay+i+1}</div></div>`;}
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===td;
    const evts=DB.tasks.filter(t=>t.due_date===ds);
    cells+=`<div class="cal-day${isT?' today':''}">
      <div class="cal-dn">${isT?`<span style="width:20px;height:20px;border-radius:50%;background:var(--base);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${d}</span>`:d}</div>
      ${evts.map(e=>`<div class="cal-ev ${e.done?'done-ev':e.due_date<td?'urgent':''}" onclick="event.stopPropagation();showTaskDetail('${e.id}')" title="${e.title}">${e.due_time?e.due_time.slice(0,5)+' ':''}${e.title}</div>`).join('')}
    </div>`;
  }
  const rem=(7-(firstDay+dim)%7)%7;
  for(let i=1;i<=rem;i++)cells+=`<div class="cal-day other-month"><div class="cal-dn">${i}</div></div>`;
  return`<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div class="cal-title">${MONTHS[mo]} ${yr}</div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${days.map(d=>`<div class="cal-dh">${d}</div>`).join('')}${cells}
    </div>
  </div>`;
}
function calNav(dir){S.calMonth+=dir;if(S.calMonth>11){S.calMonth=0;S.calYear++;}if(S.calMonth<0){S.calMonth=11;S.calYear--;}render();}

function showTaskDetail(tid){

  const diff=t.due_date?Math.round((new Date(t.due_date+'T12:00:00')-new Date())/86400000):null;
  const dlTag=diff===null?'':diff===0?`<span class="tag tg">Hoy</span>`:diff===1?`<span class="tag ty">Mañana</span>`:diff<0?`<span class="tag tr">Vencida hace ${Math.abs(diff)} días</span>`:`<span class="tag ttl">En ${diff} días</span>`;
  const wrap=document.createElement('div');wrap.className='ov';wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.innerHTML=`<div class="modal">
    <div class="mh"><div class="mt">${ic('tasks',16)} Detalle de Tarea</div>

function modal(id,title,body,large=false){
  document.getElementById(id+'_wrap')?.remove();
  const wrap=document.createElement('div');
  wrap.id=id+'_wrap';wrap.className='ov';
  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  wrap.innerHTML=`<div class="modal${large?' modal-lg':''}">
    <div class="mh"><div class="mt">${title}</div>
      <button class="btn bo bxs" onclick="document.getElementById('${id}_wrap').remove()">${ic('x',14)}</button></div>
    ${body}
  </div>`;
  document.body.appendChild(wrap);
}

function togInv(){const t=$('or_tp')?.value;const g=$('or_inv_g');if(g)g.style.display=t==='income'?'block':'none';}
function calcTax(){
  const a=parseFloat($('or_am')?.value||0);if(!a)return;
  const hasIva=$('or_iva')?.checked;const hasRet=$('or_ret')?.checked;const hasIvaRet=$('or_ivaret')?.checked;
  const rp=parseFloat($('or_rp')?.value||0);const ivaRetPct=parseFloat($('or_ivaret_pct')?.value||30);
  const ivaAmt=hasIva?a*0.15:0;const retAmt=hasRet&&rp?a*rp/100:0;
  const ivaRetAmt=hasIvaRet?(hasIva?ivaAmt:a*0.15)*ivaRetPct/100:0;
  const is=$('iva_show');if(is){is.style.display=hasIva?'inline':'none';is.textContent=fmtM(ivaAmt);}
  const rs=$('ret_show');if(rs){rs.style.display=hasRet?'inline':'none';rs.textContent='-'+fmtM(retAmt);}
  const ir=$('ivaret_show');if(ir){ir.style.display=hasIvaRet?'inline':'none';ir.textContent='-'+fmtM(ivaRetAmt);}
  const sum=$('tax_summary');const lin=$('tax_lines');const tot=$('tax_total');
  if(!sum)return;
  if(!hasIva&&!hasRet&&!hasIvaRet){sum.style.display='none';return;}
  let html=`Base: ${fmtM(a)}`;
  if(hasIva)html+=` + IVA 15%: +${fmtM(ivaAmt)}`;
  if(hasRet&&rp)html+=` − Ret. ${rp}%: -${fmtM(retAmt)}`;
  if(hasIvaRet)html+=` − Ret.IVA ${ivaRetPct}%: -${fmtM(ivaRetAmt)}`;
  const net=a+ivaAmt-retAmt-ivaRetAmt;
  if(lin)lin.innerHTML=html;
  if(tot)tot.textContent=`Neto a ${$('or_tp')?.value==='income'?'cobrar':'pagar'}: ${fmtM(net)}`;
  sum.style.display='block';
}
function addPR(){
  const n=window._prc||0;const d=document.createElement('div');d.id=`pr_${n}`;
  d.style.cssText='display:grid;grid-template-columns:70px 1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center';
  d.innerHTML=`<input class="fi" type="number" placeholder="%" min="0" max="100" oninput="calcPT()">
    <input class="fi" placeholder="Etapa..."><input class="fi" type="date">
    <button class="btn bd bxs" onclick="rmPR('pr_${n}')">${ic('x',12)}</button>`;
  $('prows')?.appendChild(d);window._prc=n+1;
}
function rmPR(id){$(id)?.remove();calcPT();}
function calcPT(){
  const rows=document.querySelectorAll('#prows>div');let tot=0;
  rows.forEach(r=>tot+=parseFloat(r.querySelector('input')?.value||0));
  const m=$('ptmsg');if(m){const ok=Math.abs(tot-100)<.5;m.textContent=`Total: ${tot}% ${ok?'✓':'— debe sumar 100%'}`;m.style.color=ok?'var(--base)':'var(--re)';}
}

async function saveTask(tid){

  if(!pid||!ttl){toast('Completa los campos obligatorios','te');return;}
  const d={project_id:pid,title:ttl,description:$('t_dsc')?.value||null,
    step_order:parseInt($('t_ord')?.value)||1,due_date:$('t_dt')?.value||null,
    due_time:$('t_tm')?.value||null,location:$('t_loc')?.value||null};

  toast(tid?'Tarea actualizada':'Tarea registrada');document.getElementById('task_wrap')?.remove();render();
}
async function toggleTask(id,done){await dbUpdate('tasks',id,{done,done_at:done?new Date().toISOString():null});render();}

async function deleteClient(id){
  if(DB.projects.some(p=>p.client_id===id)){toast('Cliente tiene proyectos asociados','te');return;}
  if(!confirm('¿Eliminar cliente?'))return;
  await dbDelete('clients',id);toast('Cliente eliminado');render();
}

async function saveProject(pid){
  const cl=$('pr_cl')?.value;const nm=$('pr_nm')?.value?.trim();const s=$('pr_s')?.value;
  if(!cl||!nm||!s){toast('Completa los campos obligatorios','te');return;}
  const rows=document.querySelectorAll('#prows>div');const sched=[];let tot=0;
  rows.forEach(r=>{
    const ins=r.querySelectorAll('input');
    const pct=parseFloat(ins[0]?.value||0);const lbl=ins[1]?.value?.trim();const dt=ins[2]?.value;
    if(pct>0&&lbl){sched.push({pct,label:lbl,due_date:dt||null,paid:false});tot+=pct;}
  });
  if(sched.length&&Math.abs(tot-100)>.5){toast('Porcentajes deben sumar 100%','te');return;}
  const pd={client_id:cl,name:nm,start_date:s,end_date:$('pr_e')?.value||null,
    contract_value:parseFloat($('pr_vl')?.value)||0,notes:$('pr_nt')?.value||null};
  if(pid){
    await dbUpdate('projects',pid,pd);
    const old=DB.payment_schedule.filter(x=>x.project_id===pid);
    for(const x of old)await dbDelete('payment_schedule',x.id);
    for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:pid});
  }else{
    const np=await dbInsert('projects',{...pd,code:await nextCode('PROJ'),status:'active'});
    if(np)for(const x of sched)await dbInsert('payment_schedule',{...x,project_id:np.id});
  }
  toast(pid?'Proyecto actualizado':'Proyecto creado');document.getElementById('project_wrap')?.remove();render();
}
async function chgProjStatus(id,status){await dbUpdate('projects',id,{status});toast('Estado actualizado');render();}
async function deleteProject(id){
  if(!confirm('¿Eliminar proyecto, tareas y órdenes?'))return;
  const pt=DB.tasks.filter(t=>t.project_id===id);const po=DB.orders.filter(o=>o.project_id===id);
  const pps=DB.payment_schedule.filter(x=>x.project_id===id);
  for(const t of pt)await dbDelete('tasks',t.id);for(const o of po)await dbDelete('orders',o.id);
  for(const x of pps)await dbDelete('payment_schedule',x.id);
  await dbDelete('projects',id);toast('Proyecto eliminado');render();
}

async function saveQuote(qid,status){

function setFF(v){S.finFilter=v;render();}

// ============================================================
//  BOOT
// ============================================================
async function startApp(){
  $('loadingScreen').style.display='flex';
  $('loadMsg').textContent='Iniciando…';
  if(KEYS_OK){
    $('loadMsg').textContent='Conectando con Supabase…';
    const ok=await loadFromSupabase();
    if(!ok){$('loadMsg').textContent='⚠ Sin conexión — modo local';}
    else{
      $('loadMsg').textContent='Cargando plantilla…';
      await loadTemplate();
    }
  }
  $('loadMsg').textContent='¡Listo!';
  const ls=$('loadingScreen');
  ls.classList.add('fade');setTimeout(()=>ls.remove(),400);
  render();
  if('Notification'in window&&Notification.permission==='granted')scheduleNotifs();
}
// PIN inicia la app
</script>
